<script>
(function(){
  function getBaseTickerHTML(el){
    const items=[...el.querySelectorAll('.ticker-item')].map(x=>x.outerHTML);
    if(!items.length) return el.innerHTML.trim();
    let n=items.length;
    if(n%4===0){
      const q=n/4;
      const a=items.slice(0,q).join('');
      if(items.slice(q,2*q).join('')===a) return a;
    }
    if(n%3===0){
      const t=n/3;
      const a=items.slice(0,t).join('');
      if(items.slice(t,2*t).join('')===a) return a;
    }
    if(n%2===0){
      const h=n/2;
      const a=items.slice(0,h).join('');
      if(items.slice(h).join('')===a) return a;
    }
    return items.join('');
  }
  function tuneTickerV21(){
    const el=document.getElementById('sportsCrawlTrack');
    const win=document.querySelector('.sports-crawl-window');
    if(!el||!win) return;
    const base=getBaseTickerHTML(el);
    if(!base) return;
    el.innerHTML=`<span class="ticker-segment">${base}</span><span class="ticker-segment" aria-hidden="true">${base}</span>`;
    requestAnimationFrame(()=>{
      const seg=el.querySelector('.ticker-segment');
      const width=seg ? seg.getBoundingClientRect().width : 0;
      if(!width) return;
      const mobile=window.matchMedia && window.matchMedia('(max-width:760px)').matches;
      const speed=mobile?120:55; // pixels per second. Mobile needs to be noticeably faster.
      const min=mobile?16:48;
      const max=mobile?34:82;
      const dur=Math.max(min,Math.min(max,width/speed));
      el.style.setProperty('--ticker-distance',`-${Math.ceil(width)}px`);
      el.style.setProperty('--ticker-duration',`${dur.toFixed(1)}s`);
      el.style.animation='none';
      // force restart after measuring
      void el.offsetWidth;
      el.style.animation='sportsCrawlV21 var(--ticker-duration) linear infinite';
    });
  }
  const previousUpdate = window.updateTickerV18 || window.updateTickerV17 || window.updateTickerV16 || window.loadTicker;

    if(typeof previousUpdate==='function') await previousUpdate();
    setTimeout(tuneTickerV21,120);
  };
  const previousEnsure=window.ensureTabs;
  window.ensureTabs=function(){
    if(typeof previousEnsure==='function') previousEnsure();
    setTimeout(window.updateTickerV21,220);
  };

})();
</script>

  function mhTeamKeys(t){const keys=new Set(); if(!t)return keys; [t.name,...(t.history||[]),...Object.values(t.seasonNames||{})].forEach(x=>{if(x)keys.add(mhNorm(x));}); return keys;}
  function mhCanon(name){const nn=mhNorm(name); for(const t of mhTeams()){if(mhTeamKeys(t).has(nn))return t.name;} return String(name||'').replace(/\s+/g,' ').trim();}
  function mhCurrentGame(g){const away=mhCanon(g.away), home=mhCanon(g.home); return {...g,awayCurrent:away,homeCurrent:home};}
  async function mhLoad(){if(mhCache)return mhCache; const res=await fetch(MH_DATA_URL,{cache:'no-store'}); if(!res.ok)throw new Error('Could not load '+MH_DATA_URL); mhCache=await res.json(); mhCache.games=(mhCache.games||[]).map(mhCurrentGame); return mhCache;}
  function mhSeasonOptions(data){let opts=['<option value="all">All Time</option>']; if(MH_IS_BBL)opts.push('<option value="modern">Modern Era</option>'); (data?.seasons||[]).forEach(s=>opts.push(`<option value="${mhEsc(s.key)}">${mhEsc(s.label)}</option>`)); return opts.join('');}
  function mhTeamOptions(){return mhTeams().map(t=>`<option value="${mhEsc(t.name)}">${mhEsc(t.name)}</option>`).join('');}
  function mhScopeGames(games,scope){if(scope==='all')return games; if(scope==='modern')return games.filter(g=>Number(g.seasonKey)>=2019); return games.filter(g=>String(g.seasonKey)===String(scope));}
  function mhInGame(g,team){return g.awayCurrent===team||g.homeCurrent===team;}
  function mhPairGames(games,a,b){return games.filter(g=>(g.awayCurrent===a&&g.homeCurrent===b)||(g.awayCurrent===b&&g.homeCurrent===a));}
  function mhResultFor(g,a){const aIsAway=g.awayCurrent===a; const us=aIsAway?g.awayScore:g.homeScore; const them=aIsAway?g.homeScore:g.awayScore; if(us>them)return 'W'; if(us<them)return 'L'; return 'T';}
  function mhScoresFor(g,a){const aIsAway=g.awayCurrent===a; return {for:aIsAway?g.awayScore:g.homeScore, against:aIsAway?g.homeScore:g.awayScore, opponent:aIsAway?g.homeCurrent:g.awayCurrent};}
  function mhSummarize(games,a,b){let w=0,l=0,t=0,pf=0,pa=0; let biggestWin=null,biggestLoss=null,closest=null,high=null,combined=null; let streakTeam='',streak=0,bestStreak={team:'',count:0}; games.sort((x,y)=>Number(x.seasonKey)-Number(y.seasonKey)||Number(x.period)-Number(y.period)); games.forEach(g=>{const r=mhResultFor(g,a), s=mhScoresFor(g,a); pf+=s.for; pa+=s.against; if(r==='W')w++; else if(r==='L')l++; else t++; const margin=Math.abs(s.for-s.against), diff=s.for-s.against, total=s.for+s.against; if(diff>0&&(!biggestWin||diff>biggestWin.diff))biggestWin={g,diff}; if(diff<0&&(!biggestLoss||diff<biggestLoss.diff))biggestLoss={g,diff}; if(!closest||margin<closest.margin)closest={g,margin}; if(!high||s.for>high.score)high={g,score:s.for}; if(!combined||total>combined.total)combined={g,total}; const winner=r==='T'?'Tie':(r==='W'?a:b); if(winner===streakTeam)streak++; else{streakTeam=winner;streak=1;} if(winner!=='Tie'&&streak>bestStreak.count)bestStreak={team:winner,count:streak};}); return {w,l,t,pf,pa,gp:games.length,avgFor:games.length?pf/games.length:0,avgAgainst:games.length?pa/games.length:0,diff:pf-pa,biggestWin,biggestLoss,closest,high,combined,bestStreak,last:games[games.length-1]};}
  function mhGameLabel(g){return `${g.season} · Period ${g.period}`;}
  function mhSummaryHtml(s,a,b){return `<div class="mh-summary"><div class="mh-stat"><b>${s.w}-${s.l}-${s.t}</b><span>${mhEsc(a)} H2H Record</span></div><div class="mh-stat"><b>${s.gp}</b><span>Games Found</span></div><div class="mh-stat"><b>${mhNum(s.pf)}</b><span>${mhEsc(a)} Total FPts</span></div><div class="mh-stat"><b>${mhNum(s.pa)}</b><span>${mhEsc(b)} Total FPts</span></div><div class="mh-stat"><b>${mhNum(s.diff)}</b><span>Point Differential</span></div><div class="mh-stat"><b>${mhNum(s.avgFor)}</b><span>${mhEsc(a)} Avg FPts</span></div><div class="mh-stat"><b>${s.bestStreak.count||0}</b><span>Best Win Streak · ${mhEsc(s.bestStreak.team||'—')}</span></div><div class="mh-stat"><b>${s.last?mhEsc(mhGameLabel(s.last)):'—'}</b><span>Last Meeting</span></div></div>`;}
  function mhVersusHtml(a,b){const ta=mhTeamByName(a), tb=mhTeamByName(b); const tag=t=>t?.dogtag?`<img src="${mhEsc(t.dogtag)}" alt="${mhEsc(t.name)}">`:`<div class="mh-team-name">${mhEsc(t?.name||'Team')}</div>`; return `<div class="mh-versus"><div class="mh-tag">${tag(ta)}</div><div class="mh-vs">VS</div><div class="mh-tag">${tag(tb)}</div></div>`;}
  function mhGameRows(games,a){return games.map(g=>{const s=mhScoresFor(g,a), r=mhResultFor(g,a); const cls=r==='W'?'mh-win':r==='L'?'mh-loss':'mh-tie'; return `<tr><td>${mhEsc(g.season)}</td><td>Period ${mhEsc(g.period)}</td><td>${mhEsc(a)} <b>${mhNum(s.for)}</b></td><td>${mhEsc(s.opponent)} <b>${mhNum(s.against)}</b></td><td class="${cls}">${r}</td><td>${mhNum(s.for-s.against)}</td></tr>`;}).join('');}
  function mhGameTable(games,a){return `<div class="mh-table-wrap"><table class="mh-table"><thead><tr><th>Season</th><th>Period</th><th>Team One</th><th>Opponent</th><th>Result</th><th>Diff</th></tr></thead><tbody>${mhGameRows(games,a)||'<tr><td colspan="6">No games found.</td></tr>'}</tbody></table></div>`;}
  function mhSeasonBreakdown(games,a,b){const by={}; games.forEach(g=>{(by[g.season]||(by[g.season]=[])).push(g);}); const rows=Object.entries(by).map(([season,gs])=>{const s=mhSummarize(gs,a,b); return `<tr><td>${mhEsc(season)}</td><td>${s.w}-${s.l}-${s.t}</td><td>${mhNum(s.pf)}</td><td>${mhNum(s.pa)}</td><td>${mhNum(s.diff)}</td><td>${s.gp}</td></tr>`;}).join(''); return `<div class="mh-table-wrap"><table class="mh-table"><thead><tr><th>Season</th><th>${mhEsc(a)} Record</th><th>${mhEsc(a)} FPts</th><th>${mhEsc(b)} FPts</th><th>Diff</th><th>Games</th></tr></thead><tbody>${rows}</tbody></table></div>`;}
  function mhOpponentRanks(allGames,scope,a){const games=mhScopeGames(allGames,scope).filter(g=>mhInGame(g,a)); const map={}; games.forEach(g=>{const s=mhScoresFor(g,a); (map[s.opponent]||(map[s.opponent]=[])).push(g);}); const rows=Object.entries(map).map(([opp,gs])=>{const s=mhSummarize(gs,a,opp); const pct=s.gp?((s.w+s.t*.5)/s.gp*100):0; return {opp,...s,pct};}).sort((x,y)=>y.pct-x.pct||y.diff-x.diff).map((r,i)=>`<tr><td>${mhOrdinal(i+1)}</td><td>${mhEsc(r.opp)}</td><td>${r.w}-${r.l}-${r.t}</td><td>${r.pct.toFixed(1)}%</td><td>${mhNum(r.diff)}</td><td>${mhNum(r.avgFor)}</td><td>${r.gp}</td></tr>`).join(''); return `<div class="mh-table-wrap"><table class="mh-table"><thead><tr><th>Rank</th><th>Opponent</th><th>Record</th><th>Win %</th><th>Diff</th><th>Avg FPts</th><th>Games</th></tr></thead><tbody>${rows}</tbody></table></div>`;}
  function mhAllPairs(games){const pairs={}; games.forEach(g=>{const a=g.awayCurrent,b=g.homeCurrent; if(!a||!b||a===b)return; const key=[a,b].sort().join('|||'); (pairs[key]||(pairs[key]=[])).push(g);}); return Object.entries(pairs).map(([key,gs])=>{const [a,b]=key.split('|||'); const s=mhSummarize(gs,a,b); const pct=s.gp?((s.w+s.t*.5)/s.gp*100):0; return {a,b,gs,...s,pct,absPctGap:Math.abs(pct-50),avgMargin:s.gp?Math.abs(s.diff)/s.gp:0};});}
  function mhRivalryRanks(allGames,scope){const rows=mhAllPairs(mhScopeGames(allGames,scope)).filter(p=>p.gp>=2).sort((x,y)=>y.gp-x.gp||x.absPctGap-y.absPctGap).slice(0,40).map((r,i)=>`<tr><td>${mhOrdinal(i+1)}</td><td>${mhEsc(r.a)} vs ${mhEsc(r.b)}</td><td>${r.gp}</td><td>${r.w}-${r.l}-${r.t}</td><td>${r.pct.toFixed(1)}%</td><td>${mhNum(r.diff)}</td><td>${mhNum(r.avgMargin)}</td></tr>`).join(''); return `<div class="mh-table-wrap"><table class="mh-table"><thead><tr><th>Rank</th><th>Rivalry</th><th>Games</th><th>Record for first team</th><th>Win %</th><th>Diff</th><th>Avg Margin</th></tr></thead><tbody>${rows}</tbody></table></div>`;}
  function mhSpecialGames(allGames,scope,type){let games=mhScopeGames(allGames,scope).map(g=>{const margin=Math.abs(g.awayScore-g.homeScore), total=g.awayScore+g.homeScore; return {...g,margin,total};}); if(type==='blowouts')games.sort((a,b)=>b.margin-a.margin); if(type==='closest')games.sort((a,b)=>a.margin-b.margin||b.total-a.total); if(type==='highest')games.sort((a,b)=>b.total-a.total); const rows=games.slice(0,50).map((g,i)=>`<tr><td>${mhOrdinal(i+1)}</td><td>${mhEsc(g.season)}</td><td>Period ${mhEsc(g.period)}</td><td>${mhEsc(g.awayCurrent)} <b>${mhNum(g.awayScore)}</b></td><td>${mhEsc(g.homeCurrent)} <b>${mhNum(g.homeScore)}</b></td><td>${mhNum(g.margin)}</td><td>${mhNum(g.total)}</td></tr>`).join(''); return `<div class="mh-table-wrap"><table class="mh-table"><thead><tr><th>Rank</th><th>Season</th><th>Period</th><th>Away</th><th>Home</th><th>Margin</th><th>Total</th></tr></thead><tbody>${rows}</tbody></table></div>`;}
  function mhViewHtml(data,a,b,scope,view){const all=data.games||[], pair=mhPairGames(mhScopeGames(all,scope),a,b).sort((x,y)=>Number(x.seasonKey)-Number(y.seasonKey)||Number(x.period)-Number(y.period)); const s=mhSummarize(pair,a,b); let title='Head-to-Head Game Log', body=mhGameTable(pair,a); if(view==='season'){title='Season Breakdown'; body=mhSeasonBreakdown(pair,a,b);} if(view==='opponents'){title=`${a} vs Every Opponent`; body=mhOpponentRanks(all,scope,a);} if(view==='rivalries'){title='League Rivalry Rankings'; body=mhRivalryRanks(all,scope);} if(view==='blowouts'){title='Biggest Blowouts'; body=mhSpecialGames(all,scope,'blowouts');} if(view==='closest'){title='Closest Games'; body=mhSpecialGames(all,scope,'closest');} if(view==='highest'){title='Highest Scoring Games'; body=mhSpecialGames(all,scope,'highest');} const scopeLabel=scope==='all'?'All Time':scope==='modern'?'Modern Era':(data.seasons.find(s=>String(s.key)===String(scope))?.label||scope); return `${mhVersusHtml(a,b)}<div class="mh-note">Scope: <b>${mhEsc(scopeLabel)}</b> · Static matchup history built from Fantrax Results CSV exports.</div>${mhSummaryHtml(s,a,b)}<div class="mh-subhead">${mhEsc(title)}</div>${body}`;}
  function buildMatchupHistoryPageV28(){return `<div class="mh-page"><div class="mh-title">Matchup History</div><div class="mh-note">Select two franchises and explore their static head-to-head history. Current-season standings still come from the Fantrax API, but these completed matchup results are saved history.</div><div class="mh-controls"><div><label>Team One</label><select class="mh-select" id="mhTeamA">${mhTeamOptions()}</select></div><div><label>Team Two</label><select class="mh-select" id="mhTeamB">${mhTeamOptions()}</select></div><div><label>Season / Era</label><select class="mh-select" id="mhScope"><option value="all">All Time</option><option value="loading">Loading seasons...</option></select></div><div><label>View / Ranking</label><select class="mh-select" id="mhView"><option value="games">Head-to-Head Game Log</option><option value="season">Season Breakdown</option><option value="opponents">Team One vs All Opponents</option><option value="rivalries">League Rivalry Rankings</option><option value="blowouts">Biggest Blowouts</option><option value="closest">Closest Games</option><option value="highest">Highest Scoring Games</option></select></div><button class="mh-button" onclick="runMatchupHistoryV28()">Show History</button></div><div id="mhResults"><div class="mh-status">Loading matchup database...</div></div></div>`;}
  window.runMatchupHistoryV28=async function(){const out=document.getElementById('mhResults'); if(!out)return; try{const data=await mhLoad(); const scopeSel=document.getElementById('mhScope'); if(scopeSel&&scopeSel.querySelector('option[value="loading"]')) scopeSel.innerHTML=mhSeasonOptions(data); const a=document.getElementById('mhTeamA')?.value||mhTeams()[0]?.name; const b=document.getElementById('mhTeamB')?.value||mhTeams()[1]?.name; const scope=document.getElementById('mhScope')?.value||'all'; const view=document.getElementById('mhView')?.value||'games'; if(!a||!b||a===b){out.innerHTML='<div class="mh-status">Choose two different teams.</div>';return;} out.innerHTML=mhViewHtml(data,a,b,scope,view);}catch(e){out.innerHTML=`<div class="mh-status">Matchup history failed to load: ${mhEsc(e.message||String(e))}</div>`;}};
  function addMatchupTabV28(){const tabs=document.querySelector('.tabs'); if(!tabs||document.getElementById('tabMatchups'))return; const btn=document.createElement('button'); btn.className='tab'; btn.id='tabMatchups'; btn.textContent='Matchup History'; btn.onclick=function(){setView('matchups')}; const comp=document.getElementById('tabCompare'); if(comp&&comp.parentNode)comp.parentNode.insertBefore(btn,comp.nextSibling); else tabs.appendChild(btn);}
  const oldRenderV28=window.render||render; window.render=render=function(){ if(view==='matchups'){document.getElementById('board').innerHTML=buildMatchupHistoryPageV28(); mhLoad().then(data=>{const sel=document.getElementById('mhScope'); if(sel)sel.innerHTML=mhSeasonOptions(data); runMatchupHistoryV28();}).catch(e=>{const out=document.getElementById('mhResults'); if(out)out.innerHTML=`<div class="mh-status">${mhEsc(e.message||String(e))}</div>`;}); return;} return oldRenderV28(); };
  const oldCtrlV28=window.ctrl||ctrl; window.ctrl=ctrl=function(){oldCtrlV28(); const tab=document.getElementById('tabMatchups'); if(tab)tab.classList.toggle('active',view==='matchups'); if(view==='matchups'){['fRowEra','fRow1','fRow2','fRowA'].forEach(id=>{const el=document.getElementById(id); if(el)el.classList.add('hide');});}};
  const oldEnsureV28=window.ensureTabs; window.ensureTabs=function(){if(typeof oldEnsureV28==='function')oldEnsureV28(); addMatchupTabV28();};
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',()=>{addMatchupTabV28();}); else addMatchupTabV28();
  // Expose V28 static matchup helpers so the merged V29 Team Comparison page can reuse them across script blocks.
  window.mhEsc=mhEsc; window.mhNorm=mhNorm; window.mhNum=mhNum; window.mhOrdinal=mhOrdinal;
  window.mhTeams=mhTeams; window.mhTeamByName=mhTeamByName; window.mhTeamKeys=mhTeamKeys; window.mhCanon=mhCanon;
  window.mhLoad=mhLoad; window.mhSeasonOptions=mhSeasonOptions; window.mhTeamOptions=mhTeamOptions;
  window.mhScopeGames=mhScopeGames; window.mhInGame=mhInGame; window.mhPairGames=mhPairGames;
  window.mhResultFor=mhResultFor; window.mhScoresFor=mhScoresFor; window.mhSummarize=mhSummarize; window.mhGameLabel=mhGameLabel;
  window.mhSummaryHtml=mhSummaryHtml; window.mhVersusHtml=mhVersusHtml; window.mhGameRows=mhGameRows; window.mhGameTable=mhGameTable;
  window.mhSeasonBreakdown=mhSeasonBreakdown; window.mhOpponentRanks=mhOpponentRanks; window.mhRivalryRanks=mhRivalryRanks; window.mhSpecialGames=mhSpecialGames;
})();

<script>
(function(){
  function v29Esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
  function v29Num(n){const x=Number(n);return Number.isFinite(x)?x.toLocaleString(undefined,{maximumFractionDigits:2}):'—';}
  function v29Ordinal(n){n=Number(n)||0;const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}
  function v29TeamOptions(){return (TEAMS||[]).map(t=>`<option value="${v29Esc(t.name)}">${v29Esc(t.name)}</option>`).join('');}

  function v29NormName(v){return String(v??'').toLowerCase().replace(/&amp;/g,'and').replace(/['’`]/g,'').replace(/[^a-z0-9]+/g,'').trim();}
  function v29AllTeams(){try{return Array.isArray(TEAMS)?TEAMS:[]}catch(e){return []}}
  function v29TeamByName(n){
    const wanted=v29NormName(n); if(!wanted)return null;
    const teams=v29AllTeams();
    for(const t of teams){
      const names=[t.name,t.id,t.teamId,t.fantraxTeamId,...(t.history||[]),...Object.values(t.seasonNames||{})].filter(Boolean);
      if(names.some(x=>v29NormName(x)===wanted))return t;
    }
    for(const t of teams){
      const names=[t.name,...(t.history||[]),...Object.values(t.seasonNames||{})].filter(Boolean).map(v29NormName);
      if(names.some(x=>x&&wanted&& (x.includes(wanted)||wanted.includes(x))))return t;
    }
    return null;
  }
  function v29ScopeOptions(data){let out=['<option value="all">All Time</option>']; if((typeof isBBL!=='undefined'&&isBBL)||((typeof FANTRAX_LIVE!=='undefined')&&FANTRAX_LIVE.league==='bbl'))out.push('<option value="modern">Modern Era</option>'); (data?.seasons||[]).slice().sort((a,b)=>Number(b.key)-Number(a.key)).forEach(s=>out.push(`<option value="${v29Esc(s.key)}">${v29Esc(s.label)}</option>`)); return out.join('');}
  function v29Dog(teamName){try{const t=v29TeamByName(teamName)||mhTeamByName(teamName)||{name:teamName}; const src=(typeof dogtagSrc==='function'?dogtagSrc(t):'') || t.dogtag || ((typeof DOGTAGS!=='undefined'&&DOGTAGS[teamName])?DOGTAGS[teamName]:''); return src?`<img src="${v29Esc(src)}" alt="${v29Esc(teamName)} dog tag" loading="lazy">`:`<div class="v29-team-name">${v29Esc(teamName)}</div>`;}catch(e){return `<div class="v29-team-name">${v29Esc(teamName)}</div>`;}}
  function v29RecHtml(rec){try{return typeof recText==='function'?recText(rec):`${rec?.w||0}-${rec?.l||0}-${rec?.t||0}`;}catch(e){return '—';}}
  function v29PctHtml(rec){try{return typeof pctText==='function'?pctText(rec):'—';}catch(e){return '—';}}
  function v29ScopeStatsSafe(name,scope){const t=v29TeamByName(name); if(!t)return {pts:0,rec:{w:0,l:0,t:0},rank:'—',label:scope}; try{return scopeStats(t,scope);}catch(e){return {pts:0,rec:{w:0,l:0,t:0},rank:'—',label:scope};}}
  function v29ValClass(a,b){a=Number(String(a).replace(/[^0-9.-]/g,'')); b=Number(String(b).replace(/[^0-9.-]/g,'')); if(!Number.isFinite(a)||!Number.isFinite(b)||a===b)return 'v29-even'; return a>b?'v29-winner':'v29-loser';}
  function v29Row(left,label,right,compare){let lc='',rc=''; if(compare){const l=Number(String(left).replace(/[^0-9.-]/g,'')), r=Number(String(right).replace(/[^0-9.-]/g,'')); if(Number.isFinite(l)&&Number.isFinite(r)&&l!==r){lc=l>r?'v29-winner':'v29-loser'; rc=r>l?'v29-winner':'v29-loser';} else {lc=rc='v29-even';}} return `<div class="v29-stat-row"><div class="v29-stat-val ${lc}">${v29Esc(left)}</div><div class="v29-stat-label">${v29Esc(label)}</div><div class="v29-stat-val ${rc}">${v29Esc(right)}</div></div>`;}
  function v29SeasonBreakdown(a,b,scope){try{return seasonBreakdown(v29TeamByName(a),v29TeamByName(b),scope);}catch(e){return ''}}
  function v33Hash(s){let h=0; String(s||'').split('').forEach(ch=>{h=(h*31+ch.charCodeAt(0))>>>0}); return h;}
  function v33PlayerName(teamName){const first=['Ace','Bobby','Johnny','Mickey','Rocky','Rusty','Gordie','Vinny','Marty','Danny','Tommy','Eddie','Reggie','Frankie','Charlie','Nicky']; const last=['Blades','Crossbar','Buckets','Stacks','Dangles','Slapper','Puckett','Ironwood','Top Shelf','Blue Line','Barnburner','Cherry','Five Hole','Chirps']; const h=v33Hash(teamName); return `${first[h%first.length]} ${last[(h>>4)%last.length]}`;}
  function v33Initials(teamName){return String(teamName||'').split(/\s+/).filter(Boolean).slice(0,2).map(x=>x[0]).join('').toUpperCase()||'FP';}
  function v33TrophyImgFor(key){try{return (typeof TROPHY_PATHS!=='undefined'&&TROPHY_PATHS[key])?TROPHY_PATHS[key]:'';}catch(e){return '';}}
  function v33AwardList(teamName){try{return awardItems(v29TeamByName(teamName)||{name:teamName})||[];}catch(e){return [];}}
  function v33TrophyHtml(teamName){const items=v33AwardList(teamName); if(!items.length)return '<div class="v33-no-trophies">No trophy case yet</div>'; return `<div class="v33-trophy-grid">${items.map(it=>{const img=v33TrophyImgFor(it.key); const who=it.player?` · ${v29Esc(it.player)}`:''; return `<div class="v33-trophy-item">${img?`<img src="${v29Esc(img)}" alt="${v29Esc(it.label)}">`:'<span></span>'}<div><div class="v33-trophy-label">${v29Esc(it.label)}${who}</div><span class="v33-trophy-season">${v29Esc(it.season||'')}</span></div></div>`;}).join('')}</div>`;}
  function v33HockeyCard(teamName,idx){const player=v33PlayerName(teamName); const initials=v33Initials(teamName); const num=(v33Hash(teamName)%91)+7; const awards=v33AwardList(teamName); const bio=awards.length?`${v29Esc(teamName)} carries ${awards.length} saved trophy-case entry${awards.length===1?'':'ies'} in the franchise archive.`:`${v29Esc(teamName)} is still chasing the next piece of hardware in the franchise archive.`; return `<div><div class="v33-hockey-card" role="button" tabindex="0" onclick="this.classList.toggle('flipped')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.classList.toggle('flipped')}"><div class="v33-card-inner"><div class="v33-card-face v33-card-front"><div class="v33-card-team-band">${v29Esc(teamName)}</div><div class="v33-card-subband">Fantasy Hockey Club</div><div class="v33-card-player-art"><div class="v33-player-hair"></div><div class="v33-player-head"></div><div class="v33-player-body" data-initials="${v29Esc(initials)}"></div><div class="v33-player-stick"></div><div class="v33-player-legs"></div></div><div class="v33-card-logo-puck">${v29Esc(initials)}</div><div class="v33-player-name">${v29Esc(player)} · C</div></div><div class="v33-card-face v33-card-back"><div class="v33-back-number">${num}</div><div class="v33-back-team-vertical">${v29Esc(teamName)}</div><div class="v33-back-panel"><div class="v33-back-title">Trophy Case</div><div class="v33-back-bio">${bio}</div>${v33TrophyHtml(teamName)}</div></div></div></div><div class="v33-card-hint">Click / tap card to flip</div></div>`;}
  function v29TrophyCards(a,b,scope){return `<div class="v33-card-note">The old trophy shelf has been rebuilt as clickable vintage hockey cards. The front shows a generated franchise player; the back carries the trophy case.</div><div class="v33-card-duel">${v33HockeyCard(a,1)}${v33HockeyCard(b,2)}</div>`;}
  function v29MatchCard(data,a,b,scope){const games=mhPairGames(mhScopeGames(data.games||[],scope),a,b).sort((x,y)=>Number(x.seasonKey)-Number(y.seasonKey)||Number(x.period)-Number(y.period)); const m=mhSummarize(games,a,b); const stA=v29ScopeStatsSafe(a,scope), stB=v29ScopeStatsSafe(b,scope); const scopeLabel=scope==='all'?'All Time':scope==='modern'?'Modern Era':(data.seasons||[]).find(s=>String(s.key)===String(scope))?.label||scope; return `<div class="v29-scorecard"><div class="v29-card-title">Head-to-Head Comparison</div><div class="v29-card-sub"><span class="v29-mini-label">${v29Esc(scopeLabel)}</span> Static results database · Fantrax CSV history</div><div class="v29-matchup-layout"><div class="v29-team-side">${v29Dog(a)}<div class="v29-team-name">${v29Esc(a)}</div><div class="v29-team-record">${v29Esc(v29RecHtml(stA.rec))}</div></div><div class="v29-stat-ladder">${v29Row(`${m.w}-${m.l}-${m.t}`,'H2H Record',`${m.l}-${m.w}-${m.t}`)}${v29Row(m.gp,'Games',m.gp)}${v29Row(v29Num(m.pf),'Total FPts',v29Num(m.pa),true)}${v29Row(v29Num(m.avgFor),'Avg FPts',v29Num(m.avgAgainst),true)}${v29Row(v29Num(m.diff),'Point Edge',v29Num(-m.diff),true)}${v29Row(m.bestStreak.team===a?m.bestStreak.count:0,'Best Streak',m.bestStreak.team===b?m.bestStreak.count:0,true)}</div><div class="v29-team-side">${v29Dog(b)}<div class="v29-team-name">${v29Esc(b)}</div><div class="v29-team-record">${v29Esc(v29RecHtml(stB.rec))}</div></div></div></div>`;}
  function v29RankBody(data,a,b,scope,view){const all=data.games||[]; const pair=mhPairGames(mhScopeGames(all,scope),a,b).sort((x,y)=>Number(x.seasonKey)-Number(y.seasonKey)||Number(x.period)-Number(y.period)); let title='Head-to-Head Game Log', body=mhGameTable(pair,a), note='Every saved matchup between the two selected teams.'; if(view==='season'){title='Season Breakdown'; body=mhSeasonBreakdown(pair,a,b); note='Head-to-head record split by season.';} if(view==='opponents'){title=`${a} vs Every Opponent`; body=mhOpponentRanks(all,scope,a); note='Ranks the selected team against every opponent in this scope.';} if(view==='rivalries'){title='League Rivalry Rankings'; body=mhRivalryRanks(all,scope); note='Ranks the busiest and closest rivalries across the league.';} if(view==='blowouts'){title='Biggest Blowouts'; body=mhSpecialGames(all,scope,'blowouts'); note='Largest margins in the selected scope.';} if(view==='closest'){title='Closest Games'; body=mhSpecialGames(all,scope,'closest'); note='Smallest margins in the selected scope.';} if(view==='highest'){title='Highest-Scoring Games'; body=mhSpecialGames(all,scope,'highest'); note='Highest combined fantasy point games.';} return `<div class="v29-section"><div class="v29-section-title">${v29Esc(title)}</div><div class="v29-rank-note">${v29Esc(note)}</div>${body}</div>`;}
  function buildTeamComparePageV29(){const views='<option value="games">Head-to-Head Game Log</option><option value="season">Season Breakdown</option><option value="opponents">Team One vs All Opponents</option><option value="rivalries">League Rivalry Rankings</option><option value="blowouts">Biggest Blowouts</option><option value="closest">Closest Games</option><option value="highest">Highest-Scoring Games</option>'; return `<div class="v29-page"><div class="v29-title">Team Comparison</div><div class="v29-note">Select two franchises to compare the full static matchup history built from your Fantrax Results CSV exports, then flip each hockey card to view the trophy case.</div><div class="v29-controls"><div><label>Team One</label><select class="v29-select" id="compareA">${v29TeamOptions()}</select></div><div><label>Team Two</label><select class="v29-select" id="compareB">${v29TeamOptions()}</select></div><div><label>Season / Era</label><select class="v29-select" id="compareScope"><option value="all">All Time</option><option value="loading">Loading seasons...</option></select></div><div><label>View / Ranking</label><select class="v29-select" id="compareView">${views}</select></div><div class="v29-action"><button class="v29-button" onclick="runTeamCompare()">Compare Teams</button></div></div><div id="teamCompareOut"><div class="v29-status">Loading matchup database...</div></div></div>`;}
  window.runTeamCompare=async function(){const out=document.getElementById('teamCompareOut'); if(!out)return; try{const data=await mhLoad(); const scopeSel=document.getElementById('compareScope'); if(scopeSel&&scopeSel.querySelector('option[value="loading"]'))scopeSel.innerHTML=v29ScopeOptions(data); const a=document.getElementById('compareA')?.value||mhTeams()[0]?.name; const b=document.getElementById('compareB')?.value||mhTeams()[1]?.name; const scope=document.getElementById('compareScope')?.value||'all'; const view=document.getElementById('compareView')?.value||'games'; if(!a||!b||a===b){out.innerHTML='<div class="v29-status">Choose two different teams.</div>';return;} out.innerHTML=v29MatchCard(data,a,b,scope)+`<div class="v29-section"><div class="v29-section-title">Hockey Card</div>${v29TrophyCards(a,b,scope)}</div><div class="v29-section"><div class="v29-section-title">Season-by-Season Points Edge</div>${v29SeasonBreakdown(a,b,scope)}</div>`+v29RankBody(data,a,b,scope,view); }catch(e){out.innerHTML=`<div class="v29-status">Team comparison failed: ${v29Esc(e.message||String(e))}</div>`;}};
  function removeMatchupsTabV29(){const tab=document.getElementById('tabMatchups'); if(tab)tab.remove(); const comp=document.getElementById('tabCompare'); if(comp)comp.textContent='Team Comparison';}
  const prevEnsureV29=window.ensureTabs; window.ensureTabs=function(){if(typeof prevEnsureV29==='function')prevEnsureV29(); removeMatchupsTabV29();};
  const prevRenderV29=window.render||render; window.render=render=function(){ if(view==='matchups')view='teamcompare'; if(view==='teamcompare'){document.getElementById('board').innerHTML=buildTeamComparePageV29(); mhLoad().then(data=>{const sel=document.getElementById('compareScope'); if(sel)sel.innerHTML=v29ScopeOptions(data); runTeamCompare();}).catch(e=>{const out=document.getElementById('teamCompareOut'); if(out)out.innerHTML=`<div class="v29-status">${v29Esc(e.message||String(e))}</div>`;}); return;} return prevRenderV29();};
  const prevCtrlV29=window.ctrl||ctrl; window.ctrl=ctrl=function(){prevCtrlV29(); removeMatchupsTabV29(); const comp=document.getElementById('tabCompare'); if(comp)comp.classList.toggle('active',view==='teamcompare'); if(view==='teamcompare'){['fRowEra','fRow1','fRow2','fRowA'].forEach(id=>{const el=document.getElementById(id); if(el)el.classList.add('hide');});}};
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',removeMatchupsTabV29); else removeMatchupsTabV29();
})();
</script>
