<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Basement Bar League</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding-bottom:60px;}
.header{background:#000;padding:0;text-align:center;overflow:hidden;border-bottom:1px solid rgba(213,157,70,.22)}
.final-header-art{display:block;width:100%;height:360px;max-height:360px;object-fit:contain;object-position:center center;background:#000;margin:0 auto}
.tabs{display:flex;justify-content:center;align-items:center;max-width:620px;margin:0 auto;border-top:1px solid rgba(213,157,70,.22);background:#000}
.tab{flex:1;padding:13px 8px;text-align:center;font-family:monospace;text-transform:uppercase;letter-spacing:2px;font-size:11px;color:rgba(213,157,70,.45);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:.2s}
.tab.active{color:#d9a24f;border-bottom-color:#d9a24f;background:rgba(213,157,70,.07)}
.filters{display:flex;justify-content:center;flex-wrap:wrap;gap:6px;padding:10px 14px;background:#000;border-bottom:1px solid rgba(213,157,70,.1)}
.fbtn{padding:7px 13px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.42);font-family:monospace;text-transform:uppercase;letter-spacing:1.5px;font-size:10px;cursor:pointer;border-radius:3px}
.fbtn.active{border-color:#d9a24f;color:#d9a24f;background:rgba(213,157,70,.08)}
.hide{display:none!important}

.ruleboard{
  max-width:1120px;
  margin:26px auto 70px;
  padding:0 16px;
}
.rulebook-hero{
  position:relative;
  overflow:hidden;
  min-height:520px;
  border:1px solid rgba(213,157,70,.34);
  border-radius:18px;
  background:
    radial-gradient(circle at 50% 0%,rgba(213,157,70,.18),transparent 36%),
    linear-gradient(180deg,rgba(24,15,7,.96),rgba(7,5,4,.98) 42%,#010101 100%);
  box-shadow:0 18px 55px rgba(0,0,0,.82), inset 0 0 0 1px rgba(255,255,255,.035), inset 0 0 90px rgba(0,0,0,.72);
}
.rulebook-hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(90deg,#000 0%,rgba(0,0,0,.38) 18%,rgba(0,0,0,.18) 50%,rgba(0,0,0,.38) 82%,#000 100%),
    radial-gradient(circle at 18% 12%,rgba(255,170,60,.16),transparent 26%),
    radial-gradient(circle at 82% 10%,rgba(255,214,120,.14),transparent 24%);
  pointer-events:none;
}
.rulebook-hero::after{
  content:"";
  position:absolute;
  inset:12px;
  border:1px solid rgba(213,157,70,.18);
  border-radius:14px;
  box-shadow:inset 0 0 30px rgba(213,157,70,.06);
  pointer-events:none;
}
.rulebook-content{
  position:relative;
  z-index:1;
  padding:34px clamp(18px,4vw,52px) 42px;
}
.rulebook-kicker{
  display:inline-block;
  font-family:monospace;
  font-size:11px;
  letter-spacing:4px;
  text-transform:uppercase;
  color:rgba(232,195,122,.68);
  border:1px solid rgba(213,157,70,.28);
  background:rgba(0,0,0,.38);
  padding:7px 12px;
  margin-bottom:14px;
}
.rulebook-title{
  font-family:Impact,"Arial Black",Haettenschweiler,"Segoe UI Black",sans-serif;
  font-size:clamp(46px,10vw,94px);
  line-height:.88;
  letter-spacing:4px;
  text-transform:uppercase;
  color:#d9a24f;
  background:linear-gradient(180deg,#fff3c4 0%,#d9a24f 30%,#8b4d10 68%,#f2cb72 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  -webkit-text-stroke:1px rgba(68,37,8,.76);
  text-shadow:0 5px 2px rgba(0,0,0,.95),0 0 25px rgba(213,157,70,.25);
  margin-bottom:20px;
}
.rule-card{
  background:rgba(0,0,0,.52);
  border:1px solid rgba(213,157,70,.22);
  border-radius:14px;
  padding:20px;
  margin-top:18px;
  box-shadow:inset 0 0 25px rgba(0,0,0,.55),0 10px 24px rgba(0,0,0,.32);
}
.rule-card h3{
  font-family:monospace;
  font-size:13px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:#f1c15d;
  margin-bottom:12px;
}
.rule-list{display:grid;gap:12px}
.rule-item{
  border-left:3px solid rgba(217,162,79,.68);
  padding:10px 12px;
  background:linear-gradient(90deg,rgba(213,157,70,.08),rgba(255,255,255,.015));
  color:rgba(255,255,255,.82);
  font-size:15px;
  line-height:1.48;
}
.rule-item strong{color:#f1c15d;text-transform:uppercase;letter-spacing:1px;font-family:monospace;font-size:12px}
.rule-note{
  margin-top:16px;
  font-family:monospace;
  font-size:11px;
  line-height:1.45;
  letter-spacing:1px;
  color:rgba(255,255,255,.44);
  text-transform:uppercase;
}
@media(max-width:720px){
  .tabs{max-width:100%}
  .tab{font-size:10px;letter-spacing:1.5px;padding:12px 6px}
  .rulebook-content{padding:24px 16px 32px}
  .rule-card{padding:16px}
  .rule-item{font-size:14px}
}

.board{max-width:1240px;margin:0 auto}
.row{display:flex;align-items:center;gap:18px;width:100%;min-height:76px;padding:10px 24px 10px 18px;border-bottom:1px solid rgba(213,157,70,.09);background:linear-gradient(90deg,rgba(255,255,255,.015),transparent);cursor:pointer}
.row:hover,.row.open{background:rgba(213,157,70,.035)}
.r-rank{flex:0 0 28px;text-align:left;font-family:"Arial Black",Impact,sans-serif;font-size:24px;color:#d9a24f;text-shadow:0 2px 8px #000}
.r-rank.s2{color:#d0d0d0}.r-rank.s3{color:#b77932}
.r-tag{flex:0 0 178px;width:178px}
.r-tag img{display:block;width:100%;height:auto;filter:drop-shadow(0 5px 12px rgba(0,0,0,.85))}
.r-info{flex:1 1 auto;min-width:170px}
.r-sub{font-family:monospace;font-size:10px;color:rgba(255,255,255,.45);letter-spacing:1px;text-transform:uppercase}
.r-season-name{margin-top:4px;font-size:12px;line-height:1.15;letter-spacing:.2px;color:rgba(255,255,255,.52);text-transform:none;font-weight:600;text-shadow:0 2px 6px rgba(0,0,0,.85)}
.r-season-name span{color:#f1c15d;font-weight:800}
.r-owner{margin-top:3px;font-size:10px;color:rgba(255,255,255,.32);font-family:monospace}
.r-cups{display:flex;flex:0 0 220px;min-width:220px;justify-content:flex-start;align-items:center;gap:10px}
.row-award{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;width:38px;height:auto;gap:2px;filter:drop-shadow(0 0 4px rgba(213,157,70,.45))}
.row-award-img{display:flex;width:25px;height:25px;align-items:center;justify-content:center}
.row-award-img img{width:25px;height:25px;object-fit:contain;display:block}
.row-award-label{display:block;font-family:monospace;font-size:6px;line-height:1;letter-spacing:.6px;color:rgba(213,157,70,.62);text-align:center;text-transform:uppercase;white-space:nowrap}
.no-cup{display:inline-block;width:38px;text-align:center;color:rgba(255,255,255,.16)}
.r-pts{flex:0 0 132px;min-width:132px;margin-left:auto;text-align:left}
.r-pts-val{display:block;min-width:132px;text-align:left;font-family:"Arial Black",Impact,sans-serif;font-size:16px;color:#d9a24f;font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1;white-space:nowrap}
.r-pts-lbl{text-align:left;font-family:monospace;font-size:7px;letter-spacing:1.4px;color:rgba(213,157,70,.48);text-transform:uppercase;margin-top:2px}
.r-chev{flex:0 0 16px;margin-left:4px;color:rgba(213,157,70,.5);font-size:18px}
.drop{display:none;background:linear-gradient(180deg,rgba(12,10,8,.98),#030303);border-bottom:1px solid rgba(213,157,70,.18)}
.drop.open{display:block}
.rec-strip{display:grid;grid-template-columns:repeat(5,1fr);border-top:1px solid rgba(213,157,70,.08);border-bottom:1px solid rgba(213,157,70,.08)}
.rec-cell{padding:9px 4px;text-align:center;border-right:1px solid rgba(255,255,255,.04)}
.rec-cell:last-child{border-right:none}
.rec-val{font-family:"Arial Black",Arial,sans-serif;font-size:14px;color:#d9a24f}
.rec-lbl{font-family:monospace;font-size:7px;color:rgba(255,255,255,.3);letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.drop-section{font-family:monospace;color:#d9a24f;text-transform:uppercase;letter-spacing:2px;font-size:10px;padding:12px 14px 7px;border-top:1px solid rgba(255,255,255,.04)}
.award-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:0 12px 12px}
.award-col{background:rgba(255,255,255,.025);border:1px solid rgba(213,157,70,.1);border-radius:10px;padding:8px 4px;text-align:center;min-height:90px}
.award-col-name{font-family:monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:6px}
.award-items{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;align-items:flex-start}
.tr{display:flex;flex-direction:column;align-items:center;width:42px;gap:2px}
.tr img{width:30px;height:30px;object-fit:contain;filter:drop-shadow(0 0 5px rgba(213,157,70,.35))}
.tr-yr{font-family:monospace;font-size:8px;color:#d9a24f}
.tr-pl{font-size:7px;color:rgba(255,255,255,.55);line-height:1.05;max-width:60px;overflow:hidden;text-overflow:ellipsis}
.tr-none{font-family:monospace;font-size:9px;color:rgba(255,255,255,.25)}
.hist{font-family:monospace;color:rgba(255,255,255,.35);font-size:9px;line-height:1.6;border-top:1px solid rgba(255,255,255,.04);padding:8px 12px}
.bs-note{font-family:monospace;color:rgba(255,255,255,.38);font-size:9px;letter-spacing:1px;text-align:center;padding:10px 14px 4px;text-transform:uppercase}
.bs-info{flex:1 1 auto;min-width:170px}
.bs-name{font-family:"Arial Black",Impact,sans-serif;font-size:16px;letter-spacing:.4px;color:#f1c15d;line-height:1.08;text-shadow:0 2px 6px rgba(0,0,0,.9)}
.bs-sub{margin-top:5px;font-size:12px;line-height:1.15;letter-spacing:.2px;color:rgba(255,255,255,.52);font-weight:600}
.bs-sub span{color:#f1c15d;font-weight:800}
.bs-stat{text-align:left;flex:0 0 auto;min-width:74px}
.bs-stat-val{font-family:"Arial Black",Impact,sans-serif;font-size:16px;color:#d9a24f;line-height:1}
.bs-stat-lbl{font-family:monospace;font-size:7px;letter-spacing:1.5px;color:rgba(213,157,70,.45);text-transform:uppercase;margin-top:2px}
@media(max-width:760px){
  .final-header-art{height:300px;max-height:300px}
  .row{gap:9px;padding-left:12px;padding-right:12px;min-height:70px}
  .r-rank{flex:0 0 22px;font-size:21px}
  .r-tag{flex:0 0 116px;width:116px}
  .r-info{min-width:90px}
  .r-cups{flex:0 0 92px;min-width:92px;gap:5px;flex-wrap:wrap}
  .row-award{width:25px}.row-award-img{width:18px;height:18px}.row-award-img img{width:18px;height:18px}
  .row-award-label{font-size:5px;letter-spacing:.2px}
  .r-pts{flex:0 0 74px;min-width:74px}.r-pts-val{min-width:74px;font-size:13px}
  .award-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:480px){
  .tabs{max-width:100%}.tab{font-size:10px;letter-spacing:1px}
  .final-header-art{height:260px;max-height:260px}
  .row{gap:7px}
  .r-tag{flex:0 0 104px;width:104px}
  .r-cups{flex:0 0 74px;min-width:74px;gap:3px}
  .r-pts{flex:0 0 66px;min-width:66px}.r-pts-val{min-width:66px;font-size:12px}
  .r-chev{display:none}
  .r-season-name{font-size:10px}
}

/* === UPLOADED ASSET WIRING === */
.r-tag img{
  background:#080808;
}
.r-tag img.missing-dogtag{
  object-fit:contain !important;
  padding:8px;
  border:1px solid rgba(213,157,70,.22);
  border-radius:8px;
}


/* === BASEMENT TROPHY CASE SHELVES + MODERN AWARD FILTER === */
.trophy-shelves{
  display:grid;
  gap:12px;
  padding:8px 10px 12px;
}
.trophy-shelf{
  position:relative;
  overflow:hidden;
  border:1px solid rgba(213,157,70,.18);
  background:
    linear-gradient(180deg,rgba(213,157,70,.08),rgba(0,0,0,.22)),
    radial-gradient(circle at 50% 0%,rgba(255,210,120,.06),transparent 45%);
  border-radius:10px;
  padding:10px 10px 12px;
  box-shadow:inset 0 -10px 20px rgba(0,0,0,.22);
}
.trophy-shelf::after{
  content:"";
  position:absolute;
  left:10px;
  right:10px;
  bottom:5px;
  height:2px;
  background:linear-gradient(90deg,transparent,rgba(213,157,70,.5),transparent);
}
.shelf-title{
  font-family:monospace;
  font-size:9px;
  letter-spacing:1.7px;
  color:#d9a24f;
  text-transform:uppercase;
  margin-bottom:8px;
  text-align:center;
}
.shelf-items{
  justify-content:center;
  min-height:46px;
}
.trophy-shelf-champ .tr img{
  width:42px;
  height:42px;
}
.trophy-shelf-pres .tr img{
  width:36px;
  height:36px;
}
.award-grid-rest{
  grid-template-columns:repeat(4,1fr) !important;
  gap:8px !important;
}
@media(max-width:560px){
  .award-grid-rest{
    grid-template-columns:repeat(2,1fr) !important;
  }
}


/* === V2 VISUAL CONFIRMATION: BASEMENT SHELVED TROPHY CASE === */
.trophy-shelf{
  margin:8px 0 !important;
}
.trophy-shelf-champ{
  border-color:rgba(255,215,120,.38) !important;
}
.trophy-shelf-pres{
  border-color:rgba(180,200,255,.30) !important;
}
.trophy-shelf-rest{
  border-color:rgba(213,157,70,.24) !important;
}
.drop-section::after{
  content:"  · v2 shelves";
  color:rgba(213,157,70,.55);
  font-size:8px;
}


/* === BASEMENT HEADER WIDTH UPDATE === */
/* Makes the header artwork wider while staying centered/symmetrical. */
.header{
  background:#000 !important;
  overflow:hidden !important;
}

.final-header-art{
  display:block !important;
  width:min(100%, 1320px) !important;
  max-width:1320px !important;
  height:360px !important;
  max-height:360px !important;
  object-fit:cover !important;
  object-position:center center !important;
  margin:0 auto !important;
}

@media(max-width:900px){
  .final-header-art{
    width:100% !important;
    max-width:100% !important;
    height:auto !important;
    max-height:none !important;
    object-fit:contain !important;
  }
}


/* === BASEMENT HEADER WIDTH HAPPY MEDIUM === */
/* Smaller than the previous wide test, wider than the original. */
.final-header-art{
  display:block !important;
  width:min(100%, 1120px) !important;
  max-width:1120px !important;
  height:360px !important;
  max-height:360px !important;
  object-fit:cover !important;
  object-position:center center !important;
  margin:0 auto !important;
}

@media(max-width:900px){
  .final-header-art{
    width:100% !important;
    max-width:100% !important;
    height:auto !important;
    max-height:none !important;
    object-fit:contain !important;
  }
}


/* === BASEMENT HEADER WIDTH NEAR ORIGINAL === */
/* Nearly back to the original size so the chalkboard stays visible. */
.final-header-art{
  display:block !important;
  width:min(100%, 760px) !important;
  max-width:760px !important;
  height:auto !important;
  max-height:none !important;
  object-fit:contain !important;
  object-position:center center !important;
  margin:0 auto !important;
}

@media(max-width:900px){
  .final-header-art{
    width:100% !important;
    max-width:100% !important;
    height:auto !important;
    object-fit:contain !important;
  }
}


/* === LEAVE BAR HOME LINK === */
.leave-bar-link{
  position:fixed;
  top:12px;
  left:12px;
  z-index:9999;
  display:inline-flex;
  align-items:center;
  gap:7px;
  padding:8px 12px;
  border:1px solid rgba(217,162,79,.48);
  border-radius:999px;
  background:rgba(0,0,0,.68);
  color:#ffcf68;
  text-decoration:none;
  font-family:monospace;
  font-size:10px;
  line-height:1;
  letter-spacing:1.8px;
  text-transform:uppercase;
  box-shadow:0 8px 24px rgba(0,0,0,.55), inset 0 0 12px rgba(217,162,79,.08);
  backdrop-filter:blur(4px);
}
.leave-bar-link:hover,
.leave-bar-link:focus-visible{
  border-color:rgba(255,207,104,.82);
  background:rgba(30,14,4,.84);
  outline:none;
}
@media(max-width:560px){
  .leave-bar-link{
    top:8px;
    left:8px;
    padding:7px 10px;
    font-size:9px;
    letter-spacing:1.2px;
  }
}



/* Draft Order board */
.draftorder-board{
  max-width:1120px;
  margin:26px auto 76px;
  padding:0 16px;
}
.draftorder-hero{
  position:relative;
  overflow:hidden;
  border:1px solid rgba(213,157,70,.34);
  border-radius:18px;
  background:
    radial-gradient(circle at 50% 0%,rgba(213,157,70,.18),transparent 34%),
    linear-gradient(180deg,rgba(24,15,7,.96),rgba(7,5,4,.98) 42%,#010101 100%);
  box-shadow:0 18px 55px rgba(0,0,0,.82), inset 0 0 0 1px rgba(255,255,255,.035), inset 0 0 90px rgba(0,0,0,.72);
}
.draftorder-hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(90deg,#000 0%,rgba(0,0,0,.34) 20%,rgba(0,0,0,.15) 50%,rgba(0,0,0,.34) 80%,#000 100%),
    radial-gradient(circle at 18% 10%,rgba(255,170,60,.15),transparent 27%),
    radial-gradient(circle at 82% 8%,rgba(255,214,120,.13),transparent 25%);
  pointer-events:none;
}
.draftorder-hero::after{
  content:"";
  position:absolute;
  inset:12px;
  border:1px solid rgba(213,157,70,.18);
  border-radius:14px;
  box-shadow:inset 0 0 30px rgba(213,157,70,.06);
  pointer-events:none;
}
.draftorder-content{position:relative;z-index:1;padding:30px clamp(14px,3vw,42px) 40px;text-align:center;}
.draftorder-kicker{
  display:inline-block;
  font-family:monospace;
  font-size:11px;
  letter-spacing:4px;
  text-transform:uppercase;
  color:rgba(232,195,122,.82);
  border:1px solid rgba(213,157,70,.34);
  background:linear-gradient(90deg,rgba(5,10,16,.78),rgba(0,0,0,.42),rgba(5,10,16,.78));
  padding:8px 14px;
  margin:0 auto 14px;
  box-shadow:0 0 18px rgba(71,149,205,.12), inset 0 0 18px rgba(213,157,70,.06);
}
.draftorder-title{
  position:relative;
  display:inline-block;
  font-family:Impact,"Arial Black",Haettenschweiler,"Segoe UI Black",sans-serif;
  font-size:clamp(44px,8vw,88px);
  line-height:.9;
  letter-spacing:5px;
  text-transform:uppercase;
  color:transparent;
  background:linear-gradient(180deg,#f8fbff 0%,#d6efff 18%,#f5c765 45%,#8b4d10 74%,#f6d889 100%);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-stroke:1px rgba(8,18,31,.9);
  text-shadow:0 5px 2px rgba(0,0,0,.95),0 0 28px rgba(71,149,205,.26),0 0 32px rgba(213,157,70,.24);
  margin:0 auto 10px;
  padding:0 46px;
}
.draftorder-title::before,
.draftorder-title::after{
  content:"";
  position:absolute;
  top:50%;
  width:30px;height:30px;
  transform:translateY(-50%);
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#2d2d2d,#050505 58%,#000 100%);
  box-shadow:0 0 0 2px rgba(255,255,255,.16),0 0 18px rgba(71,149,205,.2),inset -6px -7px 9px rgba(0,0,0,.85);
}
.draftorder-title::before{left:0;}
.draftorder-title::after{right:0;}
.draftorder-note{
  display:inline-block;
  margin:0 auto 22px;
  color:rgba(224,242,255,.7);
  font-family:monospace;
  font-size:12px;
  letter-spacing:1.2px;
  text-transform:uppercase;
  border-top:1px solid rgba(71,149,205,.22);
  border-bottom:1px solid rgba(213,157,70,.22);
  padding:8px 14px;
  background:rgba(0,0,0,.26);
}
.draftorder-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;text-align:left;}
.draft-pick-card{
  display:grid;
  grid-template-columns:58px minmax(126px,210px) 1fr;
  align-items:center;
  gap:12px;
  min-height:102px;
  padding:10px 12px;

function awardWinnerText(w,key,currentName){
  const listed=(w.listed||"").trim();
  const player=(w.player||"").trim();
  if(TEAM_AWARD_KEYS.has(key)) return listed&&listed!==currentName?listed:"";
  if(INDIVIDUAL_AWARD_KEYS.has(key)) return player||"";
  return listed&&listed!==currentName?listed:player;
}
function fmt(n){return Number(n||0).toLocaleString(undefined,{maximumFractionDigits:2}).replace(/\.0$/,"");}

}

function rowAwardsForTeam(name){
  const ta=AWARDS[name]||{};

  // Awards view name bar:
  // show ONLY the award selected by the current Awards tab.
  // Team awards show a historical team name only when it differs from the current franchise name.
  // Individual awards show the player winner instead of the team name.
  if(view==="awards"){
    return awardListForEra(ta[aMode]||[]).map(w=>({key:aMode,listed:awardWinnerText(w,aMode,name),season:w.season||w.year||"",player:w.player||""}));
  }
  const selectedYear=(view==="rankings" && season!=="all" && !rMode) ? String(season) : null;
  if(selectedYear){
    const awards=[];
    ["championship","presidents","wales","clarence","hart","norris","vezina","calder","artross","mvfp"].forEach(k=>{(ta[k]||[]).forEach(w=>{if(String(w.season)===selectedYear)awards.push({key:k,listed:awardWinnerText(w,k,name),season:w.season,player:w.player||""});});});
    return awards;
  }
  return awardListForEra(ta.championship||[]).map(w=>({key:"championship",listed:awardWinnerText(w,"championship",name),season:w.season}));
}
function rowAwardIconHtml(a){

function historicalSeasonName(t,year){const h=t.seasonNames?.[String(year)];return h&&h!==t.name?h:"";}

function recordText(obj){return `${obj?.w||0}-${obj?.l||0}-${obj?.t||0}`;}
function recordPct(obj){
  const w=Number(obj?.w||0), l=Number(obj?.l||0), t=Number(obj?.t||0), gp=w+l+t;
  return gp ? ((w + (t*.5)) / gp) * 100 : 0;
}
function seasonRecord(t,yr){return t?.records?.[String(yr)] || {w:0,l:0,t:0};}
function summedRecord(t,scope){
  if(!t) return {w:0,l:0,t:0};
  if(scope==="selected") return seasonRecord(t,season);

  // Use the verified Excel aggregate for All-Time / Modern W-L-T totals.
  // Some franchises, including Puck Her Right in the Josi, have complete all/modern
  // totals but incomplete per-season record objects. Re-summing partial season records
  // makes long-time teams collapse to only the current API season.
  const aggregate = scope==="modern" ? t.modern : t.all;
  if(aggregate && Number(aggregate.gp||0)>0){
    return {
      w:Number(aggregate.w||0),
      l:Number(aggregate.l||0),
      t:Number(aggregate.t||0)
    };
  }

  const years = scope==="modern" ? MODERN : SEASONS;
  return years.reduce((a,y)=>{const r=seasonRecord(t,y);a.w+=Number(r.w||0);a.l+=Number(r.l||0);a.t+=Number(r.t||0);return a;},{w:0,l:0,t:0});
}

function trophyItems(wins,key,currentName){

  return list.slice().sort((a,b)=>SEASONS.indexOf(a.season)-SEASONS.indexOf(b.season)).map(w=>{

    return `<div class="tr">${trophyImg(key)}<div class="tr-yr">${w.season}</div>${display?`<div class="tr-pl">${display}</div>`:""}</div>`;

function getRows(){

  }
  if(view==="awards"){
    return TEAMS.map(t=>{const count=awardCountForEra(t.name,aMode);return {name:t.name,count,main:String(count),label:"WINS",sub:(era==="modern"?"Modern Era · ":"All Time · ")+(AWARD_LABELS[aMode]||aMode)};}).filter(x=>x.count>0).sort((a,b)=>b.count-a.count||a.name.localeCompare(b.name));
  }
  if(rMode){
    if(rMode==="record"){
      const scope=season!=="all"?"selected":(era==="modern"?"modern":"all");
      const sub=season!=="all"?SN[season]:(era==="modern"?"Modern Era":"All Time");
      return TEAMS.filter(t=>scope!=="selected" || t.seasons[season]>0).map(t=>{const r=summedRecord(t,scope), pct=recordPct(r);return {name:t.name,raw:pct,w:r.w,l:r.l,t:r.t,main:recordText(r),label:"Record",sub,seasonName:scope==="selected"?historicalSeasonName(t,season):"",owner:scope==="selected"?ownerName(t,season):""};}).sort((a,b)=>b.raw-a.raw || b.w-a.w || a.l-b.l || a.name.localeCompare(b.name));
    }

    const key=keyMap[rMode];

    return TEAMS.map(t=>{const v=stat(t,key);return {name:t.name,raw:v,main:key==="pct"?pctText(v):(v>=0?"+":"")+v,label:lbl,sub:(era==="modern"?"Modern Era":"All Time")};}).sort((a,b)=>b.raw-a.raw);

/* === API additions: shared roster/trade helpers === */
let bestRosterOpen=null;
let TRADE_STATE={loaded:false,loading:false,error:null,trades:null,raw:null};
let ROSTER_STATE={loaded:false,loading:false,error:null,byTeamId:{},byName:{},raw:null};
function apiCleanText(v){return String(v??"").replace(/â€™/g,"'").replace(/[’`]/g,"'").replace(/\s+/g," ").trim();}
function apiNorm(v){return apiCleanText(v).toLowerCase().replace(/&/g,"and").replace(/[^a-z0-9]+/g,"");}
function safeJsonText(obj,max=1800){try{const s=JSON.stringify(obj,null,2);return s.length>max?s.slice(0,max)+"\n...":s;}catch(e){return String(obj).slice(0,max);}}
function playerNameFromObject(o){
  if(!o||typeof o!=="object") return "";
  const p=o.player&&typeof o.player==="object"?o.player:o.playerInfo&&typeof o.playerInfo==="object"?o.playerInfo:o;
  return apiCleanText(p.name||p.fullName||p.playerName||p.displayName||p.firstLastName||([p.firstName,p.lastName].filter(Boolean).join(" "))||o.name||o.playerName||"");
}
function playerMetaFromObject(o){
  const p=o.player&&typeof o.player==="object"?o.player:o.playerInfo&&typeof o.playerInfo==="object"?o.playerInfo:o;
  const bits=[];
  const pos=p.position||p.pos||p.defaultPosition||p.fantasyPosition||p.positions||p.eligiblePositions||o.position||o.pos;
  const team=p.team||p.proTeam||p.nhlTeam||p.teamAbbrev||p.teamName||o.proTeam||o.teamAbbrev;
  const status=o.status||p.status||o.lineupStatus||o.rosterStatus;
  if(pos) bits.push(Array.isArray(pos)?pos.join("/"):String(pos));
  if(team) bits.push(Array.isArray(team)?team.join("/"):String(team));
  if(status) bits.push(String(status));
  return apiCleanText(bits.join(" · "));
}
function collectPlayerObjects(value, out=[], seen=new Set()){
  if(!value||typeof value!=="object") return out;
  if(seen.has(value)) return out; seen.add(value);
  if(Array.isArray(value)){value.forEach(v=>collectPlayerObjects(v,out,seen)); return out;}
  const hasPlayerMarker=value.playerId||value.idpId||value.fantraxId||value.playerName||value.fullName||(value.player&&typeof value.player==="object")||(value.playerInfo&&typeof value.playerInfo==="object");
  const nm=playerNameFromObject(value);
  if(hasPlayerMarker&&nm) out.push(value);
  Object.values(value).forEach(v=>{ if(v&&typeof v==="object") collectPlayerObjects(v,out,seen); });
  return out;
}
function extractRosterTeams(data){
  const teams=[]; const seen=new Set();
  function walk(v){
    if(!v||typeof v!=="object") return;
    if(Array.isArray(v)){v.forEach(walk);return;}
    const teamId=v.teamId||v.id||v.fantasyTeamId||v.rosterId;
    const teamName=v.teamName||v.name||v.fantasyTeamName;
    const keys=["players","roster","rosterItems","lineup","bench","reserves","minors","slots","items"];
    const hasRosterArray=keys.some(k=>Array.isArray(v[k]));
    if((teamId||teamName)&&hasRosterArray){
      const key=String(teamId||teamName);
      if(!seen.has(key)){
        seen.add(key);
        let players=[]; keys.forEach(k=>{if(Array.isArray(v[k])) collectPlayerObjects(v[k],players);});
        if(!players.length) players=collectPlayerObjects(v,[]).slice(0,80);
        teams.push({teamId:apiCleanText(teamId),teamName:apiCleanText(teamName),players,raw:v});
      }
    }
    Object.values(v).forEach(walk);
  }
  walk(data);
  return teams;
}
async function loadApiRosters(){
  if(ROSTER_STATE.loaded||ROSTER_STATE.loading) return ROSTER_STATE;
  ROSTER_STATE.loading=true;
  try{
    const res=await fetch(`/api/fantrax?league=${FANTRAX_LIVE.league}&endpoint=rosters`,{cache:"no-store"});
    const payload=await res.json();
    if(!res.ok||!payload.ok) throw new Error(payload.error||"Fantrax rosters request failed");
    const teams=extractRosterTeams(payload.data);
    ROSTER_STATE.raw=payload.data;
    teams.forEach(rt=>{
      if(rt.teamId) ROSTER_STATE.byTeamId[rt.teamId]=rt;
      if(rt.teamName) ROSTER_STATE.byName[apiNorm(rt.teamName)]=rt;
    });
    ROSTER_STATE.loaded=true;
  }catch(e){ROSTER_STATE.error=e.message||String(e);} finally{ROSTER_STATE.loading=false;}
  return ROSTER_STATE;
}
function findRosterForTeam(teamName){
  const t=TEAMS.find(x=>apiNorm(x.name)===apiNorm(teamName));
  if(t&&t.fantraxTeamId&&ROSTER_STATE.byTeamId[t.fantraxTeamId]) return ROSTER_STATE.byTeamId[t.fantraxTeamId];
  return ROSTER_STATE.byName[apiNorm(teamName)]||null;
}
function buildRosterDrawer(teamName,idx){
  const panelId=`apiRosterPanel_${idx}`;
  return `<div class="api-roster-drawer"><div class="api-roster-title">Current Fantrax Roster</div><div class="api-roster-note">Current roster only; historic season rosters are not exposed by the public API yet. Current roster pulled from Fantrax API for ${apiCleanText(teamName)}. Historic season rosters depend on what Fantrax exposes.</div><div class="api-roster-actions"><button class="roster-button" onclick="event.stopPropagation(); refreshBestRoster('${String(teamName).replace(/'/g,"\\'")}',${idx})">Load / Refresh Roster</button></div><div id="${panelId}" class="roster-status">Click Load / Refresh Roster.</div></div>`;
}
function toggleBestRoster(idx,teamName){bestRosterOpen=bestRosterOpen===idx?null:idx;render();if(bestRosterOpen===idx)setTimeout(()=>refreshBestRoster(teamName,idx),40);}
async function refreshBestRoster(teamName,idx){
  const el=document.getElementById(`apiRosterPanel_${idx}`); if(!el) return;
  el.className="roster-status"; el.textContent="Loading Fantrax roster...";
  const state=await loadApiRosters();

  const roster=findRosterForTeam(teamName);
  if(!roster){el.textContent="Roster NOT FOUND for this team in the current Fantrax roster response. This may be a team-name/history mapping issue.";return;}
  const players=(roster.players||[]).filter((p,i,a)=>playerNameFromObject(p)&&a.findIndex(x=>playerNameFromObject(x)===playerNameFromObject(p))===i);
  if(!players.length){el.innerHTML=`<div class="roster-status">Team found, but no player list was recognized. Raw team object:</div><pre class="api-roster-raw">${safeJsonText(roster.raw)}</pre>`;return;}
  el.className="";
  el.innerHTML=`<div class="api-roster-grid">${players.map(p=>`<div class="api-player-card"><div class="api-player-name">${playerNameFromObject(p)}</div><div class="api-player-meta">${playerMetaFromObject(p)||"Fantrax player"}</div></div>`).join("")}</div>`;
}
function collectPotentialTrades(data){
  const trades=[]; const seen=new Set();
  function walk(v){
    if(!v||typeof v!=="object") return;
    if(Array.isArray(v)){v.forEach(walk);return;}
    const text=JSON.stringify(v).toLowerCase();
    const type=apiCleanText(v.type||v.transactionType||v.tranType||v.action||v.name||"").toLowerCase();
    if((type.includes("trade")||text.includes('"trade"')||text.includes("trade")) && text.length>40){
      const key=text.slice(0,1000); if(!seen.has(key)){seen.add(key);trades.push(v);} 
    }
    Object.values(v).forEach(walk);
  }
  walk(data); return trades;
}
async function loadTradeData(){
  if(TRADE_STATE.loaded||TRADE_STATE.loading) return TRADE_STATE;
  TRADE_STATE.loading=true;
  try{
    const res=await fetch(`/api/fantrax?league=${FANTRAX_LIVE.league}&endpoint=transactions`,{cache:"no-store"});
    const payload=await res.json();
    if(!res.ok||!payload.ok) throw new Error(payload.error||"Fantrax transactions request failed");
    TRADE_STATE.raw=payload.data;
    TRADE_STATE.trades=collectPotentialTrades(payload.data);
    TRADE_STATE.loaded=true;
  }catch(e){TRADE_STATE.error=e.message||String(e);} finally{TRADE_STATE.loading=false;}
  return TRADE_STATE;
}
function teamOptions(){return TEAMS.map(t=>`<option value="${t.name.replace(/"/g,"&quot;")}">${t.name}</option>`).join("");}
function buildTradeHistoryPage(){
  const first=TEAMS[0]?.name||"", second=TEAMS[1]?.name||first;
  return `<div class="trade-history-page"><div class="trade-title">Trade History</div><div class="trade-note">Select two teams to search Fantrax transaction/trade data. If Fantrax does not expose trades through this API, this page will show NOT FOUND instead of guessing.</div><div class="trade-controls"><div class="trade-control"><label>Team One</label><select id="tradeTeamA" class="trade-select">${teamOptions()}</select></div><div class="trade-control"><label>Team Two</label><select id="tradeTeamB" class="trade-select">${teamOptions()}</select></div><button class="trade-button" onclick="runTradeSearch()">Find Trades</button></div><div id="tradeResults" class="trade-results"><div class="trade-status">Choose two teams, then click Find Trades.</div></div></div>`;

async function runTradeSearch(){
  const out=document.getElementById("tradeResults"); if(!out) return;
  const a=document.getElementById("tradeTeamA")?.value||""; const b=document.getElementById("tradeTeamB")?.value||"";

  const aKeys=[apiNorm(a), ...(TEAMS.find(t=>t.name===a)?.history||[]).map(apiNorm)].filter(Boolean);
  const bKeys=[apiNorm(b), ...(TEAMS.find(t=>t.name===b)?.history||[]).map(apiNorm)].filter(Boolean);
  const matches=(state.trades||[]).filter(tr=>{const txt=apiNorm(JSON.stringify(tr));return aKeys.some(k=>txt.includes(k))&&bKeys.some(k=>txt.includes(k));});
  if(!matches.length){out.innerHTML=`<div class="trade-status">No trades found between ${a} and ${b} in the API response. Result: ${state.trades?.length?"NO MATCH":"NOT FOUND"}.</div>`;return;}
  out.innerHTML=matches.map((tr,i)=>`<div class="trade-card"><div class="trade-card-title">Trade ${i+1}: ${a} ↔ ${b}</div><pre class="trade-card-pre">${safeJsonText(tr)}</pre></div>`).join("");
}


/* === FANTRAX API LIVE PATCH: current standings replace embedded 2025/26 Excel values === */
const FANTRAX_LIVE={league:"bbl",seasonKey:"2025/26",loaded:false,lastError:null,matched:0,notFound:[]};
function apiBanner(msg,kind="loading"){
  let el=document.getElementById("apiStatusBar");
  if(!el){
    el=document.createElement("div");
    el.id="apiStatusBar";
    el.style.cssText="max-width:1180px;margin:10px auto 0;padding:9px 12px;border:1px solid rgba(213,157,70,.24);border-radius:10px;background:rgba(0,0,0,.42);color:rgba(255,255,255,.68);font-family:monospace;font-size:10px;letter-spacing:1.1px;text-transform:uppercase;text-align:center;box-shadow:0 8px 28px rgba(0,0,0,.26);";
    const board=document.getElementById("board");
    if(board&&board.parentNode) board.parentNode.insertBefore(el,board);
  }
  const colors={ok:"#8ee6a6",warn:"#ffd26d",err:"#ff7a7a",loading:"#d9a24f"};
  el.style.color=colors[kind]||colors.loading;
  el.textContent=msg;
}
function cleanFantraxName(name){
  return String(name||"").replace(/â€™/g,"'").replace(/[’`]/g,"'").replace(/\s+/g," ").trim();
}
function normName(name){
  return cleanFantraxName(name).toLowerCase().replace(/&/g,"and").replace(/[^a-z0-9]+/g,"");
}
function bblApiNameMap(raw){
  const cleaned=cleanFantraxName(raw);
  const direct={
    "damo'sdusters":"Damo's Dusters",
    "tuchhersanheim":"Tuch her Sanheim",
    "puckherrightinthejosi":"Puck Her Right in the Josi",
    "thedeadseabyeweek":"The Dead Sea",
    "thedeadsea":"The Dead Sea",
    "chewbacca":"Chewbacca",
    "donscherrypickers":"Don's Cherry Pickers"
  };
  const key=normName(cleaned);
  return direct[key]||cleaned;
}
function parseApiRecord(points){
  const m=String(points||"").match(/(\d+)\s*-\s*(\d+)\s*-\s*(\d+)/);
  return m?{w:+m[1],l:+m[2],t:+m[3]}:{w:0,l:0,t:0};
}
function finishBblAggregate(o){
  o.gp=Number(o.w||0)+Number(o.l||0)+Number(o.t||0);
  o.pct=o.gp?((Number(o.w||0)+(Number(o.t||0)*.5))/o.gp)*100:0;
  o.pm=Number(o.w||0)-Number(o.l||0);
  return o;
}
function applyBblApiSeasonUpdate(t,row,apiName){
  const seasonKey=FANTRAX_LIVE.seasonKey;
  const oldPts=Number(t.seasons?.[seasonKey]||0);
  const newPts=Number(row.totalPointsFor||0);
  const ptsDelta=newPts-oldPts;
  const oldRec=t.records?.[seasonKey] ? {w:Number(t.records[seasonKey].w||0),l:Number(t.records[seasonKey].l||0),t:Number(t.records[seasonKey].t||0)} : null;
  const newRec=parseApiRecord(row.points);
  t.seasons[seasonKey]=newPts;
  t.records=t.records||{};
  t.records[seasonKey]=newRec;
  t.seasonNames=t.seasonNames||{};
  t.seasonNames[seasonKey]=apiName;
  t.fantraxTeamId=row.teamId;
  t.fantraxRank=row.rank;

  // Important: many Basement franchises do not have complete year-by-year records in the embedded data.
  // Do NOT rebuild all-time totals from partial records, or old franchises collapse to only the API year.
  // Instead, preserve the original Excel aggregate and only apply a safe current-season delta.
  [t.all,t.modern].forEach(agg=>{if(agg) agg.pts=Number(agg.pts||0)+ptsDelta;});
  if(oldRec){
    [t.all,t.modern].forEach(agg=>{
      if(!agg) return;
      agg.w=Number(agg.w||0)-oldRec.w+newRec.w;
      agg.l=Number(agg.l||0)-oldRec.l+newRec.l;
      agg.t=Number(agg.t||0)-oldRec.t+newRec.t;
      finishBblAggregate(agg);
    });
  }
}
async function loadFantraxApiPatch(){
  apiBanner("Loading live Fantrax standings for Basement Bar League...","loading");
  try{
    const res=await fetch("/api/fantrax?league=bbl&endpoint=standings",{cache:"no-store"});
    const payload=await res.json();
    if(!res.ok || !payload.ok) throw new Error(payload.error || "Fantrax request failed");
    const rows=Array.isArray(payload.data)?payload.data:[];
    let matched=0, notFound=[];
    rows.forEach(row=>{
      const apiName=bblApiNameMap(row.teamName);
      const t=TEAMS.find(x=>normName(x.name)===normName(apiName));
      if(!t){notFound.push(cleanFantraxName(row.teamName));return;}
      applyBblApiSeasonUpdate(t,row,apiName);
      matched++;
    });
    FANTRAX_LIVE.loaded=true;FANTRAX_LIVE.matched=matched;FANTRAX_LIVE.notFound=notFound;
    ctrl();render();
    apiBanner(`LIVE FANTRAX API ACTIVE · ${matched} teams matched · 2025/26 standings override embedded Excel values${notFound.length?" · NOT FOUND: "+notFound.join(", "):""}`,notFound.length?"warn":"ok");
  }catch(err){
    FANTRAX_LIVE.lastError=err.message||String(err);
    apiBanner(`Fantrax API not loaded · using embedded backup data · ${FANTRAX_LIVE.lastError}`,"err");
  }
}

ctrl();render();
loadFantraxApiPatch();

  window.runTradeSearch = runTradeSearch = async function(){const out=document.getElementById("tradeResults"); if(!out)return; const a=document.getElementById("tradeTeamA")?.value||""; const b=document.getElementById("tradeTeamB")?.value||""; const season=document.getElementById("tradeSeason")?.value||"all"; out.innerHTML=`<div class="trade-status">Loading Fantrax matchup history for ${esc(a)} ↔ ${esc(b)}...</div>`; const state=await loadMatchups(); if(state.error){out.innerHTML=`<div class="trade-status">Matchup history API failed: ${esc(state.error)}</div>`;return;} await loadApiTeamKeys(); const aKeys=teamKeys(a), bKeys=teamKeys(b); let matches=(state.matchups||[]).filter(m=>{const am=(refMatches(m.a,aKeys)&&refMatches(m.b,bKeys)); const bm=(refMatches(m.a,bKeys)&&refMatches(m.b,aKeys)); return am||bm;}); if(season!=="all")matches=matches.filter(m=>norm(m.season).includes(norm(season))||norm(JSON.stringify(m.raw)).includes(norm(season))||norm(JSON.stringify(m.raw)).includes(norm((SN&&SN[season])||season))); const totalApi=(state.matchups||[]).length; if(!matches.length){out.innerHTML=`<div class="trade-status trade-empty-help"><b>No matchup records found for ${esc(a)} vs ${esc(b)}${season!=="all"?` in ${esc(season)}`:""}.</b><br>Fantrax League Info returned ${totalApi} matchup-like object(s), but none matched both selected teams. I also preloaded the current Fantrax team IDs from standings for better matching. If this still fails for old seasons, Fantrax may only expose current/upcoming matchups through this endpoint.</div><details class="trade-debug"><summary>Raw matchup diagnostic</summary><pre class="trade-card-pre">${esc(safeJsonText({selected:{a,b,season,aKeys,bKeys},apiTeamKeys:API_TEAM_KEYS,sample:(state.matchups||[]).slice(0,10).map(m=>({a:m.a,b:m.b,aScore:m.aScore,bScore:m.bScore,season:m.season,period:m.period,date:m.date,raw:m.raw}))},6000))}</pre></details>`;return;} matches.sort((x,y)=>String(x.season).localeCompare(String(y.season))||String(x.period).localeCompare(String(y.period))||String(x.date).localeCompare(String(y.date))); let w=0,l=0,t=0,scored=0; matches.forEach(m=>{const side=perspective(m,a); if(!side||m.aScore==null||m.bScore==null)return; scored++; const us=m[side+"Score"], them=m[(side==="a"?"b":"a")+"Score"]; if(us>them)w++; else if(us<them)l++; else t++;}); const bySeason={}; matches.forEach(m=>{const s=m.season||"Unknown Season"; (bySeason[s]=bySeason[s]||[]).push(m);}); const summary=`<div class="matchup-summary"><div class="matchup-stat"><b>${matches.length}</b><span>Matchups Found</span></div><div class="matchup-stat"><b>${w}-${l}-${t}</b><span>${esc(a)} Record</span></div><div class="matchup-stat"><b>${scored}</b><span>With Scores</span></div><div class="matchup-stat"><b>${season==="all"?"All":esc(season)}</b><span>Season Filter</span></div></div>`; const body=Object.entries(bySeason).map(([s,arr])=>`<div class="matchup-season-heading">${esc((SN&&SN[s])||s)}</div><div class="matchup-list">${arr.map(m=>card(m,a,b)).join("")}</div>`).join(""); out.innerHTML=summary+body;};

<script>

  async function api(endpoint){const res=await fetch(`/api/fantrax?league=${FANTRAX_LIVE.league}&endpoint=${endpoint}`,{cache:'no-store'}); const j=await res.json(); if(!res.ok||!j.ok) throw new Error(j.error||endpoint+' failed'); return j.data;}

<script>
(function(){

  function h(v){return (typeof esc==='function'?esc:String)(v==null?'':String(v));}
  function n(v){return (typeof norm==='function'?norm:String)(v==null?'':String(v)).toLowerCase().replace(/â€™/g,"'").replace(/[’`]/g,"'").replace(/\s+-\s+\(\s*bye week\s*\)/i,'').replace(/[^a-z0-9]+/g,' ').trim();}
  function parseRec(s){const m=String(s||'').match(/(\d+)\s*-\s*(\d+)\s*-\s*(\d+)/);return m?{w:+m[1],l:+m[2],t:+m[3]}:{w:0,l:0,t:0};}
  function recDiff(a,b){a=a||{w:0,l:0,t:0};b=b||{w:0,l:0,t:0};return {w:a.w-b.w,l:a.l-b.l,t:a.t-b.t};}

  function recResult(r){if(!r)return ''; if((r.w||0)>0)return 'W'; if((r.l||0)>0)return 'L'; if((r.t||0)>0)return 'T'; return ''}
  function getTeamsList(){try{return TEAMS||[]}catch(e){return[]}}
  function teamOptionsV12(){return getTeamsList().map(t=>`<option value="${h(t.name)}">${h(t.name)}</option>`).join('')}
  function seasonOptionsV12(){let arr=[];try{arr=getSeasonList()}catch(e){}; const cur=CURRENT_API_SEASON; return [`<option value="all">All Time / API Scan</option>`,`<option value="${h(cur)}">Current API Season (${h((SN&&SN[cur])||cur)})</option>`].concat(arr.filter(s=>s!==cur).map(s=>`<option value="${h(s)}">${h((SN&&SN[s])||s)}</option>`)).join('')}
  function lookupNames(selected){const key=n(selected); const out=new Set([key]); getTeamsList().forEach(t=>{if(n(t.name)===key){out.add(n(t.name)); if(t.currentName)out.add(n(t.currentName)); if(t.displayName)out.add(n(t.displayName)); if(t.names)Object.values(t.names).forEach(x=>out.add(n(x))); if(t.seasons)Object.values(t.seasons).forEach(x=>{if(x&&x.name)out.add(n(x.name));});}}); return [...out].filter(Boolean);}

  window.runTradeSearch=async function(){const out=document.getElementById('tradeResults'); if(!out)return; const a=document.getElementById('tradeTeamA')?.value||''; const b=document.getElementById('tradeTeamB')?.value||''; const season=document.getElementById('tradeSeason')?.value||'all'; const max=Math.max(1,Math.min(80,Number(document.getElementById('matchupMaxPeriod')?.value||30))); out.innerHTML=`<div class="trade-status">Scanning Fantrax Standings API periods 1-${max} for ${h(a)} ↔ ${h(b)}...</div>`; try{let progress=0; const timer=setInterval(()=>{out.innerHTML=`<div class="trade-status">Scanning Fantrax Standings API... period ${progress||1} of ${max}</div>`},700); const snaps=await scanStandingsPeriods(max,(p)=>{progress=p}); clearInterval(timer); const deltas=periodDeltas(snaps,a,b); const valid=deltas.filter(d=>d.a&&d.b&&d.changed); const inferred=valid.filter(probablyPlayedEachOther); const currentRows=rowsFromStandingsPayload(await apiV12('standings')); const curA=simplifyRow(rowFor(currentRows,a)),curB=simplifyRow(rowFor(currentRows,b)); const ignored=snaps.length>2 && JSON.stringify(snaps[0].rows)===JSON.stringify(snaps[1].rows) && JSON.stringify(snaps[1].rows)===JSON.stringify(snaps[2].rows); let cards=(inferred.length?inferred:valid).map(d=>renderDeltaCard(d,a,b)).join(''); if(!cards)cards=`<div class="trade-status trade-empty-help"><b>No usable period-by-period matchup results found.</b><br>The Standings API loaded, but I could not identify scoring-period changes for both selected teams.</div>`; const summary=`<div class="matchup-summary"><div class="matchup-stat"><b>${h(inferred.length)}</b><span>Likely H2H Periods</span></div><div class="matchup-stat"><b>${h(valid.length)}</b><span>Periods With Changes</span></div><div class="matchup-stat"><b>${h(max)}</b><span>Periods Scanned</span></div><div class="matchup-stat"><b>${h(season==='all'?'API Scan':((SN&&SN[season])||season))}</b><span>Season</span></div></div><div class="matchup-status-line"><span class="matchup-chip">Current ${h(a)}: ${h(curA?recText(curA.record):'not found')}</span><span class="matchup-chip">Current ${h(b)}: ${h(curB?recText(curB.record):'not found')}</span>${ignored?'<span class="matchup-chip matchup-current-only">Warning: period parameter may be ignored</span>':''}</div>`; const warn=season!=='all'&&season!==CURRENT_API_SEASON?`<div class="matchup-api-warning">I can only scan the season returned by this league ID. If ${h((SN&&SN[season])||season)} is an older Fantrax season, we may need that older season's league ID/API link.</div>`:''; out.innerHTML=summary+warn+cards+`<details class="trade-debug matchup-debug"><summary>Standings API diagnostics</summary><pre>${h(JSON.stringify({selected:{a,b,season,maxPeriod:max},current:{a:curA,b:curB},periodIgnoredLikely:ignored,firstPeriods:deltas.slice(0,8),sampleStandings:snaps.slice(0,3).map(s=>({period:s.period,ok:s.ok,error:s.error,rows:(s.rows||[]).slice(0,3)}))},null,2))}</pre></details>`; }catch(e){out.innerHTML=`<div class="trade-status">Standings API scan failed: ${h(e.message||String(e))}</div>`;}}
  document.addEventListener('DOMContentLoaded',()=>{const t=document.getElementById('tabTrade'); if(t)t.textContent='Matchup History';});
})();
</script>

  async function fan(endpoint,extra){const params=new URLSearchParams({league:FANTRAX_LIVE.league,endpoint}); if(extra)Object.entries(extra).forEach(([k,v])=>{if(v!==undefined&&v!==null&&v!=='')params.set(k,v)}); const res=await fetch(`/api/fantrax?${params.toString()}`,{cache:'no-store'}); const json=await res.json(); if(!res.ok||!json.ok)throw new Error(json.error||`${endpoint} failed`); return json.data;}
  async function scanPeriods(max,onProgress){const snaps=[]; for(let p=1;p<=max;p++){try{onProgress&&onProgress(p,max); const data=await fan('standings',{period:p}); snaps.push({period:p,rows:rowsFrom(data),ok:true,raw:data});}catch(e){snaps.push({period:p,rows:[],ok:false,error:e.message||String(e)});} } return snaps;}

EASON)?`<div class="matchup-v13-note">This league ID appears to return the current API season. To show ${h((typeof SN!=='undefined'&&SN&&SN[season])?SN[season]:season)} accurately, we may need that season's Fantrax league ID.</div>`:''; const currentLine=`<div class="matchup-v13-small">Current standings check: ${h(a)} ${h(curA?`${recText(curA.record)} · ${curA.pointsFor} pts`:'not found')} | ${h(b)} ${h(curB?`${recText(curB.record)} · ${curB.pointsFor} pts`:'not found')}</div>`; out.innerHTML=summary+note+seasonWarn+currentLine+renderTable(h2h,a,b)+`<details class="trade-debug matchup-debug"><summary>Diagnostics / all period changes</summary><pre>${h(JSON.stringify({selected:{a,b,season,maxPeriod:max},headToHeadRecord:rec,matchups:h2h,allScoringOrRecordChanges:allChanges.slice(0,80),periodIgnoredLikely:ignored,samplePeriods:snaps.slice(0,3).map(s=>({period:s.period,ok:s.ok,error:s.error,rowCount:(s.rows||[]).length,firstRows:(s.rows||[]).slice(0,2)}))},null,2))}</pre></details>`;}catch(e){out.innerHTML=`<div class="trade-status">Matchup scan failed: ${h(e.message||String(e))}</div>`;}};

<script>
(function(){
  const esc2 = window.esc || function(v){return String(v ?? '').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));};

  }
  function getTeamsFromRow(row){
    const c = row?.cells || [];

    const awayName = c[0]?.content ?? c[0]?.name ?? '';
    const awayId = c[0]?.teamId ?? c[0]?.id ?? '';
    const awayScore = parseFloat(String(c[1]?.content ?? '').replace(/,/g,''));

          period,
          caption,

          awayId: m.awayId,

  }
  function teamMatch(gameTeamName, gameTeamId, selected){

        return;
      }
      matches.sort((x,y)=>(Number(x.period)||0)-(Number(y.period)||0));

    }catch(err){ out.innerHTML=`<div class="trade-status">Matchup history failed: ${esc2(err.message || String(err))}</div>`; }
  };
  document.addEventListener('DOMContentLoaded',()=>{const t=document.getElementById('tabTrade'); if(t)t.textContent='Matchup History';});
})();
</script>

<script>

  function flatten(obj, out=[]){if(!obj||typeof obj!=="object")return out; if(Array.isArray(obj)){obj.forEach(x=>flatten(x,out));return out;} if(obj.teamName && (obj.rosterItems||obj.players||obj.roster)) out.push(obj); Object.values(obj).forEach(v=>flatten(v,out)); return out;}

  function buildApiCheckerPage(){return `<div class="api-tool-page"><div class="api-tool-title">API Accuracy Checker</div><div class="api-tool-note">Compares live Fantrax standings against the embedded site data for ${CURRENT_SEASON}. Mismatches show exactly where the API and old data disagree.</div><div id="apiCheckerOut"><div class="trade-status">Loading Fantrax comparison...</div></div></div>`;}

/th><th>Site Record</th></tr></thead><tbody>${table}</tbody></table></div>`;}catch(e){out.innerHTML=`<div class="trade-status">API checker failed: ${h(e.message)}</div>`;}}

  window.runTeamCompare=async function(){const out=document.getElementById('teamCompareOut'); if(!out)return; out.innerHTML='<div class="trade-status">Loading Fantrax team comparison...</div>'; try{const aName=document.getElementById('compareA').value,bName=document.getElementById('compareB').value; const a=TEAMS.find(t=>t.name===aName), b=TEAMS.find(t=>t.name===bName); const [st,ro]=await Promise.all([getJson('standings'),getJson('rosters').catch(e=>({data:null,error:e.message}))]); const rows=standingsRows(st.data); const rosterData=ro.data; const aApi=matchApiRow(a,rows), bApi=matchApiRow(b,rows); const aRoster=rosterData?rosterTeamFor(a,rosterData):null, bRoster=rosterData?rosterTeamFor(b,rosterData):null; out.innerHTML=`<div class="api-compare-grid">${renderCompareCard(a,aApi,aRoster)}${renderCompareCard(b,bApi,bRoster)}</div>`;}catch(e){out.innerHTML=`<div class="trade-status">Team comparison failed: ${h(e.message)}</div>`;}};
  const oldRender=window.render||render; window.render=render=function(){ if(view==='apicheck'){document.getElementById('board').innerHTML=buildApiCheckerPage(); setTimeout(runApiChecker,25); return;} if(view==='teamcompare'){document.getElementById('board').innerHTML=buildTeamComparePage(); return;} return oldRender(); };
  const oldCtrl=window.ctrl||ctrl; window.ctrl=ctrl=function(){ oldCtrl(); const special=view==='apicheck'||view==='teamcompare'; ['fRowEra','fRow1','fRow2','fRowA'].forEach(id=>{const el=document.getElementById(id); if(el&&special)el.classList.add('hide');}); const api=document.getElementById('tabApiCheck'), comp=document.getElementById('tabCompare'); if(api)api.classList.toggle('active',view==='apicheck'); if(comp)comp.classList.toggle('active',view==='teamcompare'); };

<script>
(function(){

  const fmtNum=n=>Number(n||0).toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2});
  const recText=r=>r?`${Number(r.w||0)}-${Number(r.l||0)}-${Number(r.t||0)}`:'—';

  const trophyLabels={championship:'Championships',presidents:'Presidents',clarence:'Clarence Campbell',wales:'Prince of Wales',hart:'Hart',norris:'Norris',vezina:'Vezina',calder:'Rookie',artross:'Art Ross',mvfp:'MVFP'};
  const trophyKeys=['championship','presidents','clarence','wales','hart','norris','vezina','calder','artross','mvfp'];
  function seasonKeys(){try{return Array.isArray(SEASONS)?SEASONS.slice():[]}catch(e){return []}}
  function seasonLabel(s){try{return (typeof SN!=='undefined'&&SN[s])?SN[s]:String(s)}catch(e){return String(s)}}

  function currentSeasonDisplay(){const keys=seasonKeys().slice().sort((a,b)=>seasonSortValue(b)-seasonSortValue(a)); return keys[0]||'2025/26';}
  function sameSeason(a,b){const A=String(a).replace(/^20/,'').replace(/[^0-9]/g,''); const B=String(b).replace(/^20/,'').replace(/[^0-9]/g,''); return A&&B&&A===B;}
  function teamByName(n){return (TEAMS||[]).find(t=>norm(t.name)===norm(n)) || (TEAMS||[]).find(t=>norm(t.name).includes(norm(n))||norm(n).includes(norm(t.name)));}
  function teamSeasonPoints(team, s){

  function teamSeasonRecordGeneric(team, s){

  }
  function teamAllRecord(team){

  }
  function teamAllPoints(team){ if(!team)return 0; if(team.all&&team.all.pts!=null)return Number(team.all.pts||0); if(team.pts!=null)return Number(team.pts||0); return seasonKeys().reduce((a,s)=>a+teamSeasonPoints(team,s),0);}

  window.runTeamCompare=function(){const out=document.getElementById('teamCompareOut'); if(!out)return; const a=teamByName(document.getElementById('compareA')?.value), b=teamByName(document.getElementById('compareB')?.value), scope=document.getElementById('compareScope')?.value||'all'; if(!a||!b){out.innerHTML='<div class="trade-status">Team not found.</div>';return;} out.innerHTML=`<div class="v16-scope-note">${scope==='all'?'All-Time Franchise Comparison':'Season Comparison: '+h(seasonLabel(scope))}</div><div class="api-compare-grid">${compareCard(a,scope)}${compareCard(b,scope)}</div><div class="v16-compare-divider"></div><div class="api-tool-note">Season-by-season points and records</div>${seasonBreakdown(a,b)}`;};
  const prevRender=window.render||render; window.render=render=function(){ if(view==='apicheck'){view='rankings';} if(view==='teamcompare'){document.getElementById('board').innerHTML=buildTeamComparePageV16(); return;} return prevRender(); };
  const prevCtrl=window.ctrl||ctrl; window.ctrl=ctrl=function(){ prevCtrl(); const api=document.getElementById('tabApiCheck'); if(api)api.remove(); const comp=document.getElementById('tabCompare'); if(comp)comp.classList.toggle('active',view==='teamcompare'); const special=view==='teamcompare'; ['fRowEra','fRow1','fRow2','fRowA'].forEach(id=>{const el=document.getElementById(id); if(el&&special)el.classList.add('hide');}); };
  function tickerMessages(){const win=champWinner(); const base=[]; base.push(`<span class="ticker-item"><span class="ticker-tag">Draft Results</span>Draft results feed is ready for future updates.</span>`); base.push(`<span class="ticker-item"><span class="ticker-tag">Champions</span>Congrats to ${h(win?.team||'our winner')}${win?.season?` · ${h(win.season)}`:''}.</span>`); base.push(`<span class="ticker-item"><span class="ticker-tag">League News</span>New Season Meeting TBA.</span>`); base.push(`<span class="ticker-item"><span class="ticker-tag">Rules Desk</span>Rule Changes TBA.</span>`); base.push(`<span class="ticker-item"><span class="ticker-tag">Draft Desk</span>Draft Date TBA.</span>`); return base;}
  async function updateTickerV16(){const el=document.getElementById('sportsCrawlTrack'); if(!el)return; const items=[]; try{const res=await fetch(`/api/fantrax?league=${encodeURIComponent((typeof FANTRAX_LIVE!=='undefined'&&FANTRAX_LIVE.league)||'bbl')}&endpoint=standings`,{cache:'no-store'}); const js=await res.json(); const rows=Array.isArray(js.data)?js.data:(Array.isArray(js.data?.data)?js.data.data:[]); rows.slice().sort((a,b)=>(+a.rank||99)-(+b.rank||99)).slice(0,4).forEach(r=>items.push(`<span class="ticker-item"><span class="ticker-tag">Standings</span>${h(String(r.teamName||'').replace(/â€™/g,'’').replace(/\s+-\s*\(\s*Bye week\s*\)/i,''))} #${h(r.rank)} · ${h(r.points||'')} · ${h(r.totalPointsFor)} pts</span>`));}catch(e){} items.push(...tickerMessages()); el.innerHTML=(items.join('')+items.join('')+items.join(''));}
  // Historic best-season roster safety: never show current roster for a past season.
  const curSeason=currentSeasonDisplay();
  window.buildRosterDrawer=function(teamName,idx,seasonValue){const panelId=`apiRosterPanel_${idx}`; const isCurrent=sameSeason(seasonValue||'',curSeason); return `<div class="api-roster-drawer"><div class="api-roster-title">${isCurrent?'Current Fantrax Roster':'Historical Final Roster'}</div><div class="api-roster-note">${isCurrent?'Current season roster pulled from Fantrax API.':'Historical final roster is not available from the public Fantrax roster API yet.'}</div><div class="api-roster-actions"><button class="roster-button" onclick="event.stopPropagation(); refreshBestRoster('${String(teamName).replace(/'/g,"\\'")}',${idx},'${String(seasonValue||'').replace(/'/g,"\\'")}')">${isCurrent?'Load / Refresh Roster':'Check Roster Source'}</button></div><div id="${panelId}" class="roster-status">${isCurrent?'Click Load / Refresh Roster.':'Historical roster not loaded. Click to confirm data source status.'}</div></div>`;};
  const previousRefresh=window.refreshBestRoster;
  window.refreshBestRoster=async function(teamName,idx,seasonValue){const el=document.getElementById(`apiRosterPanel_${idx}`); if(!el)return; if(!sameSeason(seasonValue||'',curSeason)){el.innerHTML=`<div class="v16-historic-roster-warning"><b>Historical roster NOT FOUND through Fantrax public API.</b><br>This best season is ${h(seasonValue||'a past season')}. The current roster API would show today's roster, so this site will not display it here. To show the true final roster for that season, we need a historical roster export, old season league ID, or another Fantrax endpoint.</div>`; return;} if(typeof previousRefresh==='function')return previousRefresh(teamName,idx);};
  const previousBestRow=window.buildBestSeasonRow||buildBestSeasonRow;
  window.buildBestSeasonRow=buildBestSeasonRow=function(item,i){
    try{
      const teamName=item.franchise||item.name; const t=teamByName(teamName)||{}; const seasonValue=item.season||item.year||''; const tagSrc=(typeof DOGTAGS!=='undefined'&&DOGTAGS[teamName])?DOGTAGS[teamName]:(t.dogtag||''); const pct=(Number(item.pct)/100).toFixed(3).replace(/^0/,'.'); const fp=item.fpts!=null?fmtNum(item.fpts):(item.Points!=null?fmtNum(item.Points):'—'); const hasHist=item.team&&item.team!==teamName; const seasonNote=hasHist?`${seasonValue} · Season Name: ${item.team}`:`${seasonValue}`; const mainA=bsMode==='points'?fp:(item.record||recText(item)); const lblA=bsMode==='points'?'Fantasy Pts':'W-L-T'; const mainB=bsMode==='points'?(item.record||recText(item)):pct; const lblB=bsMode==='points'?'W-L-T':'Win %'; const drawer=bestRosterOpen===i?buildRosterDrawer(teamName,i,seasonValue):''; const rosterLine=sameSeason(seasonValue,curSeason)?'Current season roster available':'Historical final roster requires export';
      return `<div class="best-season-shell"><div class="row best-season-row" onclick="toggleBestRoster(${i},'${String(teamName).replace(/'/g,"\\'")}','${String(seasonValue).replace(/'/g,"\\'")}')"><div class="r-rank${i===1?' s2':i===2?' s3':''}">${i+1}</div><div class="r-tag"><img src="${tagSrc}" alt="${h(teamName)}" loading="lazy"></div><div class="bs-info"><div class="bs-name">${h(teamName)}</div><div class="bs-sub">Season: <span>${h(seasonNote)}</span></div><div class="api-roster-note" style="text-align:left;margin:6px 0 0">${h(rosterLine)}</div></div><div class="bs-stat"><div class="bs-stat-val">${h(mainA)}</div><div class="bs-stat-lbl">${h(lblA)}</div></div><div class="bs-stat"><div class="bs-stat-val">${h(mainB)}</div><div class="bs-stat-lbl">${h(lblB)}</div></div><div class="r-pts"><div class="r-pts-val">${bsMode==='points'?h(pct):h(fp)}</div><div class="r-pts-lbl">${bsMode==='points'?'Win %':'FPts'}</div></div></div>${drawer}</div>`;
    }catch(e){return previousBestRow(item,i);}
  };
  const oldToggle=window.toggleBestRoster;
  window.toggleBestRoster=function(idx,teamName,seasonValue){bestRosterOpen=bestRosterOpen===idx?null:idx;render(); if(bestRosterOpen===idx)setTimeout(()=>refreshBestRoster(teamName,idx,seasonValue),40);};
  document.addEventListener('DOMContentLoaded',()=>{const api=document.getElementById('tabApiCheck'); if(api)api.remove(); setTimeout(updateTickerV16,650);});
})();
</script>
