<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Basement Bar League</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding-bottom:60px;}
.header{background:#000;padding:0;text-align:center;overflow:hidden;border-bottom:1px solid rgba(213,157,70,.22)}
.final-header-art{display:block;width:100%;height:360px;max-height:360px;object-fit:contain;object-position:center center;background:#000;margin:0 auto}
.tabs{display:flex;justify-content:center;align-items:center;max-width:620px;margin:0 auto;border-top:1px solid rgba(213,157,70,.22);background:#000}
.tab{flex:1;padding:13px 8px;text-align:center;font-family:monospace;text-transform:uppercase;letter-spacing:2px;font-size:11px;color:rgba(213,157,70,.45);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:.2s}
.tab.active{color:#d9a24f;border-bottom-color:#d9a24f;background:rgba(213,157,70,.07)}
.filters{display:flex;justify-content:center;flex-wrap:wrap;gap:6px;padding:10px 14px;background:#000;border-bottom:1px solid rgba(213,157,70,.1)}
.fbtn{padding:7px 13px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.42);font-family:monospace;text-transform:uppercase;letter-spacing:1.5px;font-size:10px;cursor:pointer;border-radius:3px}
.fbtn.active{border-color:#d9a24f;color:#d9a24f;background:rgba(213,157,70,.08)}
.hide{display:none!important}

.ruleboard{
  max-width:1120px;
  margin:26px auto 70px;
  padding:0 16px;
}
.rulebook-hero{
  position:relative;
  overflow:hidden;
  min-height:520px;
  border:1px solid rgba(213,157,70,.34);
  border-radius:18px;
  background:
    radial-gradient(circle at 50% 0%,rgba(213,157,70,.18),transparent 36%),
    linear-gradient(180deg,rgba(24,15,7,.96),rgba(7,5,4,.98) 42%,#010101 100%);
  box-shadow:0 18px 55px rgba(0,0,0,.82), inset 0 0 0 1px rgba(255,255,255,.035), inset 0 0 90px rgba(0,0,0,.72);
}
.rulebook-hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(90deg,#000 0%,rgba(0,0,0,.38) 18%,rgba(0,0,0,.18) 50%,rgba(0,0,0,.38) 82%,#000 100%),
    radial-gradient(circle at 18% 12%,rgba(255,170,60,.16),transparent 26%),
    radial-gradient(circle at 82% 10%,rgba(255,214,120,.14),transparent 24%);
  pointer-events:none;
}
.rulebook-hero::after{
  content:"";
  position:absolute;
  inset:12px;
  border:1px solid rgba(213,157,70,.18);
  border-radius:14px;
  box-shadow:inset 0 0 30px rgba(213,157,70,.06);
  pointer-events:none;
}
.rulebook-content{
  position:relative;
  z-index:1;
  padding:34px clamp(18px,4vw,52px) 42px;
}
.rulebook-kicker{
  display:inline-block;
  font-family:monospace;
  font-size:11px;
  letter-spacing:4px;
  text-transform:uppercase;
  color:rgba(232,195,122,.68);
  border:1px solid rgba(213,157,70,.28);
  background:rgba(0,0,0,.38);
  padding:7px 12px;
  margin-bottom:14px;
}
.rulebook-title{
  font-family:Impact,"Arial Black",Haettenschweiler,"Segoe UI Black",sans-serif;
  font-size:clamp(46px,10vw,94px);
  line-height:.88;
  letter-spacing:4px;
  text-transform:uppercase;
  color:#d9a24f;
  background:linear-gradient(180deg,#fff3c4 0%,#d9a24f 30%,#8b4d10 68%,#f2cb72 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  -webkit-text-stroke:1px rgba(68,37,8,.76);
  text-shadow:0 5px 2px rgba(0,0,0,.95),0 0 25px rgba(213,157,70,.25);
  margin-bottom:20px;
}
.rule-card{
  background:rgba(0,0,0,.52);
  border:1px solid rgba(213,157,70,.22);
  border-radius:14px;
  padding:20px;
  margin-top:18px;
  box-shadow:inset 0 0 25px rgba(0,0,0,.55),0 10px 24px rgba(0,0,0,.32);
}
.rule-card h3{
  font-family:monospace;
  font-size:13px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:#f1c15d;
  margin-bottom:12px;
}
.rule-list{display:grid;gap:12px}
.rule-item{
  border-left:3px solid rgba(217,162,79,.68);
  padding:10px 12px;
  background:linear-gradient(90deg,rgba(213,157,70,.08),rgba(255,255,255,.015));
  color:rgba(255,255,255,.82);
  font-size:15px;
  line-height:1.48;
}
.rule-item strong{color:#f1c15d;text-transform:uppercase;letter-spacing:1px;font-family:monospace;font-size:12px}
.rule-note{
  margin-top:16px;
  font-family:monospace;
  font-size:11px;
  line-height:1.45;
  letter-spacing:1px;
  color:rgba(255,255,255,.44);
  text-transform:uppercase;
}
@media(max-width:720px){
  .tabs{max-width:100%}
  .tab{font-size:10px;letter-spacing:1.5px;padding:12px 6px}
  .rulebook-content{padding:24px 16px 32px}
  .rule-card{padding:16px}
  .rule-item{font-size:14px}
}

.board{max-width:1240px;margin:0 auto}
.row{display:flex;align-items:center;gap:18px;width:100%;min-height:76px;padding:10px 24px 10px 18px;border-bottom:1px solid rgba(213,157,70,.09);background:linear-gradient(90deg,rgba(255,255,255,.015),transparent);cursor:pointer}
.row:hover,.row.open{background:rgba(213,157,70,.035)}
.r-rank{flex:0 0 28px;text-align:left;font-family:"Arial Black",Impact,sans-serif;font-size:24px;color:#d9a24f;text-shadow:0 2px 8px #000}
.r-rank.s2{color:#d0d0d0}.r-rank.s3{color:#b77932}
.r-tag{flex:0 0 178px;width:178px}
.r-tag img{display:block;width:100%;height:auto;filter:drop-shadow(0 5px 12px rgba(0,0,0,.85))}
.r-info{flex:1 1 auto;min-width:170px}
.r-sub{font-family:monospace;font-size:10px;color:rgba(255,255,255,.45);letter-spacing:1px;text-transform:uppercase}
.r-season-name{margin-top:4px;font-size:12px;line-height:1.15;letter-spacing:.2px;color:rgba(255,255,255,.52);text-transform:none;font-weight:600;text-shadow:0 2px 6px rgba(0,0,0,.85)}
.r-season-name span{color:#f1c15d;font-weight:800}
.r-owner{margin-top:3px;font-size:10px;color:rgba(255,255,255,.32);font-family:monospace}
.r-cups{display:flex;flex:0 0 220px;min-width:220px;justify-content:flex-start;align-items:center;gap:10px}
.row-award{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;width:38px;height:auto;gap:2px;filter:drop-shadow(0 0 4px rgba(213,157,70,.45))}
.row-award-img{display:flex;width:25px;height:25px;align-items:center;justify-content:center}
.row-award-img img{width:25px;height:25px;object-fit:contain;display:block}
.row-award-label{display:block;font-family:monospace;font-size:6px;line-height:1;letter-spacing:.6px;color:rgba(213,157,70,.62);text-align:center;text-transform:uppercase;white-space:nowrap}
.no-cup{display:inline-block;width:38px;text-align:center;color:rgba(255,255,255,.16)}
.r-pts{flex:0 0 132px;min-width:132px;margin-left:auto;text-align:left}
.r-pts-val{display:block;min-width:132px;text-align:left;font-family:"Arial Black",Impact,sans-serif;font-size:16px;color:#d9a24f;font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1;white-space:nowrap}
.r-pts-lbl{text-align:left;font-family:monospace;font-size:7px;letter-spacing:1.4px;color:rgba(213,157,70,.48);text-transform:uppercase;margin-top:2px}
.r-chev{flex:0 0 16px;margin-left:4px;color:rgba(213,157,70,.5);font-size:18px}
.drop{display:none;background:linear-gradient(180deg,rgba(12,10,8,.98),#030303);border-bottom:1px solid rgba(213,157,70,.18)}
.drop.open{display:block}
.rec-strip{display:grid;grid-template-columns:repeat(5,1fr);border-top:1px solid rgba(213,157,70,.08);border-bottom:1px solid rgba(213,157,70,.08)}
.rec-cell{padding:9px 4px;text-align:center;border-right:1px solid rgba(255,255,255,.04)}
.rec-cell:last-child{border-right:none}
.rec-val{font-family:"Arial Black",Arial,sans-serif;font-size:14px;color:#d9a24f}
.rec-lbl{font-family:monospace;font-size:7px;color:rgba(255,255,255,.3);letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.drop-section{font-family:monospace;color:#d9a24f;text-transform:uppercase;letter-spacing:2px;font-size:10px;padding:12px 14px 7px;border-top:1px solid rgba(255,255,255,.04)}
.award-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:0 12px 12px}
.award-col{background:rgba(255,255,255,.025);border:1px solid rgba(213,157,70,.1);border-radius:10px;padding:8px 4px;text-align:center;min-height:90px}
.award-col-name{font-family:monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:6px}
.award-items{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;align-items:flex-start}
.tr{display:flex;flex-direction:column;align-items:center;width:42px;gap:2px}
.tr img{width:30px;height:30px;object-fit:contain;filter:drop-shadow(0 0 5px rgba(213,157,70,.35))}
.tr-yr{font-family:monospace;font-size:8px;color:#d9a24f}
.tr-pl{font-size:7px;color:rgba(255,255,255,.55);line-height:1.05;max-width:60px;overflow:hidden;text-overflow:ellipsis}
.tr-none{font-family:monospace;font-size:9px;color:rgba(255,255,255,.25)}
.hist{font-family:monospace;color:rgba(255,255,255,.35);font-size:9px;line-height:1.6;border-top:1px solid rgba(255,255,255,.04);padding:8px 12px}
.bs-note{font-family:monospace;color:rgba(255,255,255,.38);font-size:9px;letter-spacing:1px;text-align:center;padding:10px 14px 4px;text-transform:uppercase}
.bs-info{flex:1 1 auto;min-width:170px}
.bs-name{font-family:"Arial Black",Impact,sans-serif;font-size:16px;letter-spacing:.4px;color:#f1c15d;line-height:1.08;text-shadow:0 2px 6px rgba(0,0,0,.9)}
.bs-sub{margin-top:5px;font-size:12px;line-height:1.15;letter-spacing:.2px;color:rgba(255,255,255,.52);font-weight:600}
.bs-sub span{color:#f1c15d;font-weight:800}
.bs-stat{text-align:left;flex:0 0 auto;min-width:74px}
.bs-stat-val{font-family:"Arial Black",Impact,sans-serif;font-size:16px;color:#d9a24f;line-height:1}
.bs-stat-lbl{font-family:monospace;font-size:7px;letter-spacing:1.5px;color:rgba(213,157,70,.45);text-transform:uppercase;margin-top:2px}
@media(max-width:760px){
  .final-header-art{height:300px;max-height:300px}
  .row{gap:9px;padding-left:12px;padding-right:12px;min-height:70px}
  .r-rank{flex:0 0 22px;font-size:21px}
  .r-tag{flex:0 0 116px;width:116px}
  .r-info{min-width:90px}
  .r-cups{flex:0 0 92px;min-width:92px;gap:5px;flex-wrap:wrap}
  .row-award{width:25px}.row-award-img{width:18px;height:18px}.row-award-img img{width:18px;height:18px}
  .row-award-label{font-size:5px;letter-spacing:.2px}
  .r-pts{flex:0 0 74px;min-width:74px}.r-pts-val{min-width:74px;font-size:13px}
  .award-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:480px){
  .tabs{max-width:100%}.tab{font-size:10px;letter-spacing:1px}
  .final-header-art{height:260px;max-height:260px}
  .row{gap:7px}
  .r-tag{flex:0 0 104px;width:104px}
  .r-cups{flex:0 0 74px;min-width:74px;gap:3px}
  .r-pts{flex:0 0 66px;min-width:66px}.r-pts-val{min-width:66px;font-size:12px}
  .r-chev{display:none}
  .r-season-name{font-size:10px}
}

/* === UPLOADED ASSET WIRING === */
.r-tag img{
  background:#080808;
}
.r-tag img.missing-dogtag{
  object-fit:contain !important;
  padding:8px;
  border:1px solid rgba(213,157,70,.22);
  border-radius:8px;
}


/* === BASEMENT TROPHY CASE SHELVES + MODERN AWARD FILTER === */
.trophy-shelves{
  display:grid;
  gap:12px;
  padding:8px 10px 12px;
}
.trophy-shelf{
  position:relative;
  overflow:hidden;
  border:1px solid rgba(213,157,70,.18);
  background:
    linear-gradient(180deg,rgba(213,157,70,.08),rgba(0,0,0,.22)),
    radial-gradient(circle at 50% 0%,rgba(255,210,120,.06),transparent 45%);
  border-radius:10px;
  padding:10px 10px 12px;
  box-shadow:inset 0 -10px 20px rgba(0,0,0,.22);
}
.trophy-shelf::after{
  content:"";
  position:absolute;
  left:10px;
  right:10px;
  bottom:5px;
  height:2px;
  background:linear-gradient(90deg,transparent,rgba(213,157,70,.5),transparent);
}
.shelf-title{
  font-family:monospace;
  font-size:9px;
  letter-spacing:1.7px;
  color:#d9a24f;
  text-transform:uppercase;
  margin-bottom:8px;
  text-align:center;
}
.shelf-items{
  justify-content:center;
  min-height:46px;
}
.trophy-shelf-champ .tr img{
  width:42px;
  height:42px;
}
.trophy-shelf-pres .tr img{
  width:36px;
  height:36px;
}
.award-grid-rest{
  grid-template-columns:repeat(4,1fr) !important;
  gap:8px !important;
}
@media(max-width:560px){
  .award-grid-rest{
    grid-template-columns:repeat(2,1fr) !important;
  }
}


/* === V2 VISUAL CONFIRMATION: BASEMENT SHELVED TROPHY CASE === */
.trophy-shelf{
  margin:8px 0 !important;
}
.trophy-shelf-champ{
  border-color:rgba(255,215,120,.38) !important;
}
.trophy-shelf-pres{
  border-color:rgba(180,200,255,.30) !important;
}
.trophy-shelf-rest{
  border-color:rgba(213,157,70,.24) !important;
}
.drop-section::after{
  content:"  · v2 shelves";
  color:rgba(213,157,70,.55);
  font-size:8px;
}


/* === BASEMENT HEADER WIDTH UPDATE === */
/* Makes the header artwork wider while staying centered/symmetrical. */
.header{
  background:#000 !important;
  overflow:hidden !important;
}

.final-header-art{
  display:block !important;
  width:min(100%, 1320px) !important;
  max-width:1320px !important;
  height:360px !important;
  max-height:360px !important;
  object-fit:cover !important;
  object-position:center center !important;
  margin:0 auto !important;
}

@media(max-width:900px){
  .final-header-art{
    width:100% !important;
    max-width:100% !important;
    height:auto !important;
    max-height:none !important;
    object-fit:contain !important;
  }
}


/* === BASEMENT HEADER WIDTH HAPPY MEDIUM === */
/* Smaller than the previous wide test, wider than the original. */
.final-header-art{
  display:block !important;
  width:min(100%, 1120px) !important;
  max-width:1120px !important;
  height:360px !important;
  max-height:360px !important;
  object-fit:cover !important;
  object-position:center center !important;
  margin:0 auto !important;
}

@media(max-width:900px){
  .final-header-art{
    width:100% !important;
    max-width:100% !important;
    height:auto !important;
    max-height:none !important;
    object-fit:contain !important;
  }
}


/* === BASEMENT HEADER WIDTH NEAR ORIGINAL === */
/* Nearly back to the original size so the chalkboard stays visible. */
.final-header-art{
  display:block !important;
  width:min(100%, 760px) !important;
  max-width:760px !important;
  height:auto !important;
  max-height:none !important;
  object-fit:contain !important;
  object-position:center center !important;
  margin:0 auto !important;
}

@media(max-width:900px){
  .final-header-art{
    width:100% !important;
    max-width:100% !important;
    height:auto !important;
    object-fit:contain !important;
  }
}


/* === LEAVE BAR HOME LINK === */
.leave-bar-link{
  position:fixed;
  top:12px;
  left:12px;
  z-index:9999;
  display:inline-flex;
  align-items:center;
  gap:7px;
  padding:8px 12px;
  border:1px solid rgba(217,162,79,.48);
  border-radius:999px;
  background:rgba(0,0,0,.68);
  color:#ffcf68;
  text-decoration:none;
  font-family:monospace;
  font-size:10px;
  line-height:1;
  letter-spacing:1.8px;
  text-transform:uppercase;
  box-shadow:0 8px 24px rgba(0,0,0,.55), inset 0 0 12px rgba(217,162,79,.08);
  backdrop-filter:blur(4px);
}
.leave-bar-link:hover,
.leave-bar-link:focus-visible{
  border-color:rgba(255,207,104,.82);
  background:rgba(30,14,4,.84);
  outline:none;
}
@media(max-width:560px){
  .leave-bar-link{
    top:8px;
    left:8px;
    padding:7px 10px;
    font-size:9px;
    letter-spacing:1.2px;
  }
}



/* Draft Order board */
.draftorder-board{
  max-width:1120px;
  margin:26px auto 76px;
  padding:0 16px;
}
.draftorder-hero{
  position:relative;
  overflow:hidden;
  border:1px solid rgba(213,157,70,.34);
  border-radius:18px;
  background:
    radial-gradient(circle at 50% 0%,rgba(213,157,70,.18),transparent 34%),
    linear-gradient(180deg,rgba(24,15,7,.96),rgba(7,5,4,.98) 42%,#010101 100%);
  box-shadow:0 18px 55px rgba(0,0,0,.82), inset 0 0 0 1px rgba(255,255,255,.035), inset 0 0 90px rgba(0,0,0,.72);
}
.draftorder-hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(90deg,#000 0%,rgba(0,0,0,.34) 20%,rgba(0,0,0,.15) 50%,rgba(0,0,0,.34) 80%,#000 100%),
    radial-gradient(circle at 18% 10%,rgba(255,170,60,.15),transparent 27%),
    radial-gradient(circle at 82% 8%,rgba(255,214,120,.13),transparent 25%);
  pointer-events:none;
}
.draftorder-hero::after{
  content:"";
  position:absolute;
  inset:12px;
  border:1px solid rgba(213,157,70,.18);
  border-radius:14px;
  box-shadow:inset 0 0 30px rgba(213,157,70,.06);
  pointer-events:none;
}
.draftorder-content{position:relative;z-index:1;padding:30px clamp(14px,3vw,42px) 40px;text-align:center;}
.draftorder-kicker{
  display:inline-block;
  font-family:monospace;
  font-size:11px;
  letter-spacing:4px;
  text-transform:uppercase;
  color:rgba(232,195,122,.82);
  border:1px solid rgba(213,157,70,.34);
  background:linear-gradient(90deg,rgba(5,10,16,.78),rgba(0,0,0,.42),rgba(5,10,16,.78));
  padding:8px 14px;
  margin:0 auto 14px;
  box-shadow:0 0 18px rgba(71,149,205,.12), inset 0 0 18px rgba(213,157,70,.06);
}
.draftorder-title{
  position:relative;
  display:inline-block;
  font-family:Impact,"Arial Black",Haettenschweiler,"Segoe UI Black",sans-serif;
  font-size:clamp(44px,8vw,88px);
  line-height:.9;
  letter-spacing:5px;
  text-transform:uppercase;
  color:transparent;
  background:linear-gradient(180deg,#f8fbff 0%,#d6efff 18%,#f5c765 45%,#8b4d10 74%,#f6d889 100%);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-stroke:1px rgba(8,18,31,.9);
  text-shadow:0 5px 2px rgba(0,0,0,.95),0 0 28px rgba(71,149,205,.26),0 0 32px rgba(213,157,70,.24);
  margin:0 auto 10px;
  padding:0 46px;
}
.draftorder-title::before,
.draftorder-title::after{
  content:"";
  position:absolute;
  top:50%;
  width:30px;height:30px;
  transform:translateY(-50%);
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#2d2d2d,#050505 58%,#000 100%);
  box-shadow:0 0 0 2px rgba(255,255,255,.16),0 0 18px rgba(71,149,205,.2),inset -6px -7px 9px rgba(0,0,0,.85);
}
.draftorder-title::before{left:0;}
.draftorder-title::after{right:0;}
.draftorder-note{
  display:inline-block;
  margin:0 auto 22px;
  color:rgba(224,242,255,.7);
  font-family:monospace;
  font-size:12px;
  letter-spacing:1.2px;
  text-transform:uppercase;
  border-top:1px solid rgba(71,149,205,.22);
  border-bottom:1px solid rgba(213,157,70,.22);
  padding:8px 14px;
  background:rgba(0,0,0,.26);
}
.draftorder-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;text-align:left;}
.draft-pick-card{
  display:grid;
  grid-template-columns:58px minmax(126px,210px) 1fr;
  align-items:center;
  gap:12px;
  min-height:102px;
  padding:10px 12px;

function awardWinnerText(w,key,currentName){
  const listed=(w.listed||"").trim();
  const player=(w.player||"").trim();
  if(TEAM_AWARD_KEYS.has(key)) return listed&&listed!==currentName?listed:"";
  if(INDIVIDUAL_AWARD_KEYS.has(key)) return player||"";
  return listed&&listed!==currentName?listed:player;
}
function fmt(n){return Number(n||0).toLocaleString(undefined,{maximumFractionDigits:2}).replace(/\.0$/,"");}

}

function rowAwardsForTeam(name){
  const ta=AWARDS[name]||{};

  // Awards view name bar:
  // show ONLY the award selected by the current Awards tab.
  // Team awards show a historical team name only when it differs from the current franchise name.
  // Individual awards show the player winner instead of the team name.
  if(view==="awards"){
    return awardListForEra(ta[aMode]||[]).map(w=>({key:aMode,listed:awardWinnerText(w,aMode,name),season:w.season||w.year||"",player:w.player||""}));
  }
  const selectedYear=(view==="rankings" && season!=="all" && !rMode) ? String(season) : null;
  if(selectedYear){
    const awards=[];
    ["championship","presidents","wales","clarence","hart","norris","vezina","calder","artross","mvfp"].forEach(k=>{(ta[k]||[]).forEach(w=>{if(String(w.season)===selectedYear)awards.push({key:k,listed:awardWinnerText(w,k,name),season:w.season,player:w.player||""});});});
    return awards;
  }
  return awardListForEra(ta.championship||[]).map(w=>({key:"championship",listed:awardWinnerText(w,"championship",name),season:w.season}));
}
function rowAwardIconHtml(a){

function historicalSeasonName(t,year){const h=t.seasonNames?.[String(year)];return h&&h!==t.name?h:"";}

function recordText(obj){return `${obj?.w||0}-${obj?.l||0}-${obj?.t||0}`;}
function recordPct(obj){
  const w=Number(obj?.w||0), l=Number(obj?.l||0), t=Number(obj?.t||0), gp=w+l+t;
  return gp ? ((w + (t*.5)) / gp) * 100 : 0;
}
function seasonRecord(t,yr){return t?.records?.[String(yr)] || {w:0,l:0,t:0};}
function summedRecord(t,scope){
  if(!t) return {w:0,l:0,t:0};
  if(scope==="selected") return seasonRecord(t,season);

  // Use the verified Excel aggregate for All-Time / Modern W-L-T totals.
  // Some franchises, including Puck Her Right in the Josi, have complete all/modern
  // totals but incomplete per-season record objects. Re-summing partial season records
  // makes long-time teams collapse to only the current API season.
  const aggregate = scope==="modern" ? t.modern : t.all;
  if(aggregate && Number(aggregate.gp||0)>0){
    return {
      w:Number(aggregate.w||0),
      l:Number(aggregate.l||0),
      t:Number(aggregate.t||0)
    };
  }

  const years = scope==="modern" ? MODERN : SEASONS;
  return years.reduce((a,y)=>{const r=seasonRecord(t,y);a.w+=Number(r.w||0);a.l+=Number(r.l||0);a.t+=Number(r.t||0);return a;},{w:0,l:0,t:0});
}

function trophyItems(wins,key,currentName){

  return list.slice().sort((a,b)=>SEASONS.indexOf(a.season)-SEASONS.indexOf(b.season)).map(w=>{

    return `<div class="tr">${trophyImg(key)}<div class="tr-yr">${w.season}</div>${display?`<div class="tr-pl">${display}</div>`:""}</div>`;

function getRows(){

  }
  if(view==="awards"){
    return TEAMS.map(t=>{const count=awardCountForEra(t.name,aMode);return {name:t.name,count,main:String(count),label:"WINS",sub:(era==="modern"?"Modern Era · ":"All Time · ")+(AWARD_LABELS[aMode]||aMode)};}).filter(x=>x.count>0).sort((a,b)=>b.count-a.count||a.name.localeCompare(b.name));
  }
  if(rMode){
    if(rMode==="record"){
      const scope=season!=="all"?"selected":(era==="modern"?"modern":"all");
      const sub=season!=="all"?SN[season]:(era==="modern"?"Modern Era":"All Time");
      return TEAMS.filter(t=>scope!=="selected" || t.seasons[season]>0).map(t=>{const r=summedRecord(t,scope), pct=recordPct(r);return {name:t.name,raw:pct,w:r.w,l:r.l,t:r.t,main:recordText(r),label:"Record",sub,seasonName:scope==="selected"?historicalSeasonName(t,season):"",owner:scope==="selected"?ownerName(t,season):""};}).sort((a,b)=>b.raw-a.raw || b.w-a.w || a.l-b.l || a.name.localeCompare(b.name));
    }

    const key=keyMap[rMode];

    return TEAMS.map(t=>{const v=stat(t,key);return {name:t.name,raw:v,main:key==="pct"?pctText(v):(v>=0?"+":"")+v,label:lbl,sub:(era==="modern"?"Modern Era":"All Time")};}).sort((a,b)=>b.raw-a.raw);

/* === API additions: shared roster/trade helpers === */
let bestRosterOpen=null;
let TRADE_STATE={loaded:false,loading:false,error:null,trades:null,raw:null};
let ROSTER_STATE={loaded:false,loading:false,error:null,byTeamId:{},byName:{},raw:null};
function apiCleanText(v){return String(v??"").replace(/â€™/g,"'").replace(/[’`]/g,"'").replace(/\s+/g," ").trim();}
function apiNorm(v){return apiCleanText(v).toLowerCase().replace(/&/g,"and").replace(/[^a-z0-9]+/g,"");}
function safeJsonText(obj,max=1800){try{const s=JSON.stringify(obj,null,2);return s.length>max?s.slice(0,max)+"\n...":s;}catch(e){return String(obj).slice(0,max);}}
function playerNameFromObject(o){
  if(!o||typeof o!=="object") return "";
  const p=o.player&&typeof o.player==="object"?o.player:o.playerInfo&&typeof o.playerInfo==="object"?o.playerInfo:o;
  return apiCleanText(p.name||p.fullName||p.playerName||p.displayName||p.firstLastName||([p.firstName,p.lastName].filter(Boolean).join(" "))||o.name||o.playerName||"");
}
function playerMetaFromObject(o){
  const p=o.player&&typeof o.player==="object"?o.player:o.playerInfo&&typeof o.playerInfo==="object"?o.playerInfo:o;
  const bits=[];
  const pos=p.position||p.pos||p.defaultPosition||p.fantasyPosition||p.positions||p.eligiblePositions||o.position||o.pos;
  const team=p.team||p.proTeam||p.nhlTeam||p.teamAbbrev||p.teamName||o.proTeam||o.teamAbbrev;
  const status=o.status||p.status||o.lineupStatus||o.rosterStatus;
  if(pos) bits.push(Array.isArray(pos)?pos.join("/"):String(pos));
  if(team) bits.push(Array.isArray(team)?team.join("/"):String(team));
  if(status) bits.push(String(status));
  return apiCleanText(bits.join(" · "));
}
function collectPlayerObjects(value, out=[], seen=new Set()){
  if(!value||typeof value!=="object") return out;
  if(seen.has(value)) return out; seen.add(value);
  if(Array.isArray(value)){value.forEach(v=>collectPlayerObjects(v,out,seen)); return out;}
  const hasPlayerMarker=value.playerId||value.idpId||value.fantraxId||value.playerName||value.fullName||(value.player&&typeof value.player==="object")||(value.playerInfo&&typeof value.playerInfo==="object");
  const nm=playerNameFromObject(value);
  if(hasPlayerMarker&&nm) out.push(value);
  Object.values(value).forEach(v=>{ if(v&&typeof v==="object") collectPlayerObjects(v,out,seen); });
  return out;
}
function extractRosterTeams(data){
  const teams=[]; const seen=new Set();
  function walk(v){
    if(!v||typeof v!=="object") return;
    if(Array.isArray(v)){v.forEach(walk);return;}
    const teamId=v.teamId||v.id||v.fantasyTeamId||v.rosterId;
    const teamName=v.teamName||v.name||v.fantasyTeamName;
    const keys=["players","roster","rosterItems","lineup","bench","reserves","minors","slots","items"];
    const hasRosterArray=keys.some(k=>Array.isArray(v[k]));
    if((teamId||teamName)&&hasRosterArray){
      const key=String(teamId||teamName);
      if(!seen.has(key)){
        seen.add(key);
        let players=[]; keys.forEach(k=>{if(Array.isArray(v[k])) collectPlayerObjects(v[k],players);});
        if(!players.length) players=collectPlayerObjects(v,[]).slice(0,80);
        teams.push({teamId:apiCleanText(teamId),teamName:apiCleanText(teamName),players,raw:v});
      }
    }
    Object.values(v).forEach(walk);
  }
  walk(data);
  return teams;
}
async function loadApiRosters(){
  if(ROSTER_STATE.loaded||ROSTER_STATE.loading) return ROSTER_STATE;
  ROSTER_STATE.loading=true;
  try{
    const res=await fetch(`/api/fantrax?league=${FANTRAX_LIVE.league}&endpoint=rosters`,{cache:"no-store"});
    const payload=await res.json();
    if(!res.ok||!payload.ok) throw new Error(payload.error||"Fantrax rosters request failed");
    const teams=extractRosterTeams(payload.data);
    ROSTER_STATE.raw=payload.data;
    teams.forEach(rt=>{
      if(rt.teamId) ROSTER_STATE.byTeamId[rt.teamId]=rt;
      if(rt.teamName) ROSTER_STATE.byName[apiNorm(rt.teamName)]=rt;
    });
    ROSTER_STATE.loaded=true;
  }catch(e){ROSTER_STATE.error=e.message||String(e);} finally{ROSTER_STATE.loading=false;}
  return ROSTER_STATE;
}
function findRosterForTeam(teamName){
  const t=TEAMS.find(x=>apiNorm(x.name)===apiNorm(teamName));
  if(t&&t.fantraxTeamId&&ROSTER_STATE.byTeamId[t.fantraxTeamId]) return ROSTER_STATE.byTeamId[t.fantraxTeamId];
  return ROSTER_STATE.byName[apiNorm(teamName)]||null;
}
function buildRosterDrawer(teamName,idx){
  const panelId=`apiRosterPanel_${idx}`;
  return `<div class="api-roster-drawer"><div class="api-roster-title">Current Fantrax Roster</div><div class="api-roster-note">Current roster only; historic season rosters are not exposed by the public API yet. Current roster pulled from Fantrax API for ${apiCleanText(teamName)}. Historic season rosters depend on what Fantrax exposes.</div><div class="api-roster-actions"><button class="roster-button" onclick="event.stopPropagation(); refreshBestRoster('${String(teamName).replace(/'/g,"\\'")}',${idx})">Load / Refresh Roster</button></div><div id="${panelId}" class="roster-status">Click Load / Refresh Roster.</div></div>`;
}
function toggleBestRoster(idx,teamName){bestRosterOpen=bestRosterOpen===idx?null:idx;render();if(bestRosterOpen===idx)setTimeout(()=>refreshBestRoster(teamName,idx),40);}
async function refreshBestRoster(teamName,idx){
  const el=document.getElementById(`apiRosterPanel_${idx}`); if(!el) return;
  el.className="roster-status"; el.textContent="Loading Fantrax roster...";
  const state=await loadApiRosters();

  const roster=findRosterForTeam(teamName);
  if(!roster){el.textContent="Roster NOT FOUND for this team in the current Fantrax roster response. This may be a team-name/history mapping issue.";return;}
  const players=(roster.players||[]).filter((p,i,a)=>playerNameFromObject(p)&&a.findIndex(x=>playerNameFromObject(x)===playerNameFromObject(p))===i);
  if(!players.length){el.innerHTML=`<div class="roster-status">Team found, but no player list was recognized. Raw team object:</div><pre class="api-roster-raw">${safeJsonText(roster.raw)}</pre>`;return;}
  el.className="";
  el.innerHTML=`<div class="api-roster-grid">${players.map(p=>`<div class="api-player-card"><div class="api-player-name">${playerNameFromObject(p)}</div><div class="api-player-meta">${playerMetaFromObject(p)||"Fantrax player"}</div></div>`).join("")}</div>`;
}
function collectPotentialTrades(data){
  const trades=[]; const seen=new Set();
  function walk(v){
    if(!v||typeof v!=="object") return;
    if(Array.isArray(v)){v.forEach(walk);return;}
    const text=JSON.stringify(v).toLowerCase();
    const type=apiCleanText(v.type||v.transactionType||v.tranType||v.action||v.name||"").toLowerCase();
    if((type.includes("trade")||text.includes('"trade"')||text.includes("trade")) && text.length>40){
      const key=text.slice(0,1000); if(!seen.has(key)){seen.add(key);trades.push(v);} 
    }
    Object.values(v).forEach(walk);
  }
  walk(data); return trades;
}
async function loadTradeData(){
  if(TRADE_STATE.loaded||TRADE_STATE.loading) return TRADE_STATE;
  TRADE_STATE.loading=true;
  try{
    const res=await fetch(`/api/fantrax?league=${FANTRAX_LIVE.league}&endpoint=transactions`,{cache:"no-store"});
    const payload=await res.json();
    if(!res.ok||!payload.ok) throw new Error(payload.error||"Fantrax transactions request failed");
    TRADE_STATE.raw=payload.data;
    TRADE_STATE.trades=collectPotentialTrades(payload.data);
    TRADE_STATE.loaded=true;
  }catch(e){TRADE_STATE.error=e.message||String(e);} finally{TRADE_STATE.loading=false;}
  return TRADE_STATE;
}
function teamOptions(){return TEAMS.map(t=>`<option value="${t.name.replace(/"/g,"&quot;")}">${t.name}</option>`).join("");}
function buildTradeHistoryPage(){
  const first=TEAMS[0]?.name||"", second=TEAMS[1]?.name||first;
  return `<div class="trade-history-page"><div class="trade-title">Trade History</div><div class="trade-note">Select two teams to search Fantrax transaction/trade data. If Fantrax does not expose trades through this API, this page will show NOT FOUND instead of guessing.</div><div class="trade-controls"><div class="trade-control"><label>Team One</label><select id="tradeTeamA" class="trade-select">${teamOptions()}</select></div><div class="trade-control"><label>Team Two</label><select id="tradeTeamB" class="trade-select">${teamOptions()}</select></div><button class="trade-button" onclick="runTradeSearch()">Find Trades</button></div><div id="tradeResults" class="trade-results"><div class="trade-status">Choose two teams, then click Find Trades.</div></div></div>`;

async function runTradeSearch(){
  const out=document.getElementById("tradeResults"); if(!out) return;
  const a=document.getElementById("tradeTeamA")?.value||""; const b=document.getElementById("tradeTeamB")?.value||"";

  const aKeys=[apiNorm(a), ...(TEAMS.find(t=>t.name===a)?.history||[]).map(apiNorm)].filter(Boolean);
  const bKeys=[apiNorm(b), ...(TEAMS.find(t=>t.name===b)?.history||[]).map(apiNorm)].filter(Boolean);
  const matches=(state.trades||[]).filter(tr=>{const txt=apiNorm(JSON.stringify(tr));return aKeys.some(k=>txt.includes(k))&&bKeys.some(k=>txt.includes(k));});
  if(!matches.length){out.innerHTML=`<div class="trade-status">No trades found between ${a} and ${b} in the API response. Result: ${state.trades?.length?"NO MATCH":"NOT FOUND"}.</div>`;return;}
  out.innerHTML=matches.map((tr,i)=>`<div class="trade-card"><div class="trade-card-title">Trade ${i+1}: ${a} ↔ ${b}</div><pre class="trade-card-pre">${safeJsonText(tr)}</pre></div>`).join("");
}


/* === FANTRAX API LIVE PATCH: current standings replace embedded 2025/26 Excel values === */
const FANTRAX_LIVE={league:"bbl",seasonKey:"2025/26",loaded:false,lastError:null,matched:0,notFound:[]};
function apiBanner(msg,kind="loading"){
  let el=document.getElementById("apiStatusBar");
  if(!el){
    el=document.createElement("div");
    el.id="apiStatusBar";
    el.style.cssText="max-width:1180px;margin:10px auto 0;padding:9px 12px;border:1px solid rgba(213,157,70,.24);border-radius:10px;background:rgba(0,0,0,.42);color:rgba(255,255,255,.68);font-family:monospace;font-size:10px;letter-spacing:1.1px;text-transform:uppercase;text-align:center;box-shadow:0 8px 28px rgba(0,0,0,.26);";
    const board=document.getElementById("board");
    if(board&&board.parentNode) board.parentNode.insertBefore(el,board);
  }
  const colors={ok:"#8ee6a6",warn:"#ffd26d",err:"#ff7a7a",loading:"#d9a24f"};
  el.style.color=colors[kind]||colors.loading;
  el.textContent=msg;
}
function cleanFantraxName(name){
  return String(name||"").replace(/â€™/g,"'").replace(/[’`]/g,"'").replace(/\s+/g," ").trim();
}
function normName(name){
  return cleanFantraxName(name).toLowerCase().replace(/&/g,"and").replace(/[^a-z0-9]+/g,"");
}
function bblApiNameMap(raw){
  const cleaned=cleanFantraxName(raw);
  const direct={
    "damo'sdusters":"Damo's Dusters",
    "tuchhersanheim":"Tuch her Sanheim",
    "puckherrightinthejosi":"Puck Her Right in the Josi",
    "thedeadseabyeweek":"The Dead Sea",
    "thedeadsea":"The Dead Sea",
    "chewbacca":"Chewbacca",
    "donscherrypickers":"Don's Cherry Pickers"
  };
  const key=normName(cleaned);
  return direct[key]||cleaned;
}
function parseApiRecord(points){
  const m=String(points||"").match(/(\d+)\s*-\s*(\d+)\s*-\s*(\d+)/);
  return m?{w:+m[1],l:+m[2],t:+m[3]}:{w:0,l:0,t:0};
}
function finishBblAggregate(o){
  o.gp=Number(o.w||0)+Number(o.l||0)+Number(o.t||0);
  o.pct=o.gp?((Number(o.w||0)+(Number(o.t||0)*.5))/o.gp)*100:0;
  o.pm=Number(o.w||0)-Number(o.l||0);
  return o;
}
function applyBblApiSeasonUpdate(t,row,apiName){
  const seasonKey=FANTRAX_LIVE.seasonKey;
  const oldPts=Number(t.seasons?.[seasonKey]||0);
  const newPts=Number(row.totalPointsFor||0);
  const ptsDelta=newPts-oldPts;
  const oldRec=t.records?.[seasonKey] ? {w:Number(t.records[seasonKey].w||0),l:Number(t.records[seasonKey].l||0),t:Number(t.records[seasonKey].t||0)} : null;
  const newRec=parseApiRecord(row.points);
  t.seasons[seasonKey]=newPts;
  t.records=t.records||{};
  t.records[seasonKey]=newRec;
  t.seasonNames=t.seasonNames||{};
  t.seasonNames[seasonKey]=apiName;
  t.fantraxTeamId=row.teamId;
  t.fantraxRank=row.rank;

  // Important: many Basement franchises do not have complete year-by-year records in the embedded data.
  // Do NOT rebuild all-time totals from partial records, or old franchises collapse to only the API year.
  // Instead, preserve the original Excel aggregate and only apply a safe current-season delta.
  [t.all,t.modern].forEach(agg=>{if(agg) agg.pts=Number(agg.pts||0)+ptsDelta;});
  if(oldRec){
    [t.all,t.modern].forEach(agg=>{
      if(!agg) return;
      agg.w=Number(agg.w||0)-oldRec.w+newRec.w;
      agg.l=Number(agg.l||0)-oldRec.l+newRec.l;
      agg.t=Number(agg.t||0)-oldRec.t+newRec.t;
      finishBblAggregate(agg);
    });
  }
}
async function loadFantraxApiPatch(){
  apiBanner("Loading live Fantrax standings for Basement Bar League...","loading");
  try{
    const res=await fetch("/api/fantrax?league=bbl&endpoint=standings",{cache:"no-store"});
    const payload=await res.json();
    if(!res.ok || !payload.ok) throw new Error(payload.error || "Fantrax request failed");
    const rows=Array.isArray(payload.data)?payload.data:[];
    let matched=0, notFound=[];
    rows.forEach(row=>{
      const apiName=bblApiNameMap(row.teamName);
      const t=TEAMS.find(x=>normName(x.name)===normName(apiName));
      if(!t){notFound.push(cleanFantraxName(row.teamName));return;}
      applyBblApiSeasonUpdate(t,row,apiName);
      matched++;
    });
    FANTRAX_LIVE.loaded=true;FANTRAX_LIVE.matched=matched;FANTRAX_LIVE.notFound=notFound;
    ctrl();render();
    apiBanner(`LIVE FANTRAX API ACTIVE · ${matched} teams matched · 2025/26 standings override embedded Excel values${notFound.length?" · NOT FOUND: "+notFound.join(", "):""}`,notFound.length?"warn":"ok");
  }catch(err){
    FANTRAX_LIVE.lastError=err.message||String(err);
    apiBanner(`Fantrax API not loaded · using embedded backup data · ${FANTRAX_LIVE.lastError}`,"err");
  }
}

ctrl();render();
loadFantraxApiPatch();

<script>
(function(){
  const TRADE_ENDPOINT_CANDIDATES=["transactions","trades","getTransactions","getTransactionHistory","getLeagueTransactions","getLeagueActivity","getActivity","getTransactionLog"];
  let API_DETAIL_CACHE={leagueInfo:null,playerMap:null,endpointAttempts:null};
  function _clean(v){return String(v??"").replace(/â€™/g,"'").replace(/[’`]/g,"'").replace(/\s+/g," ").trim();}
  function _norm(v){return _clean(v).toLowerCase().replace(/&/g,"and").replace(/[^a-z0-9]+/g,"");}
  function _escape(s){return _clean(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}
  function _maybePlayerId(v){
    if(v==null) return "";

    return "";
  }
  function _objId(o){return _maybePlayerId(o?.playerId||o?.idpId||o?.fantraxId||o?.player?.id||o?.playerInfo?.id||o?.id||o?.playerKey);}
  function _objName(o){
    if(!o||typeof o!=="object") return "";

    return _clean(p.name||p.fullName||p.playerName||p.displayName||p.firstLastName||p.firstLast||([p.firstName,p.lastName].filter(Boolean).join(" "))||o.name||o.playerName||"");
  }
  function _objMeta(o, item){
    const p=(o&&o.player&&typeof o.player==="object")?o.player:(o&&o.playerInfo&&typeof o.playerInfo==="object")?o.playerInfo:o||{};
    const bits=[];
    const pos=item?.position||item?.pos||p.position||p.pos||p.defaultPosition||p.fantasyPosition||p.positions||p.eligiblePositions;
    const pro=p.proTeam||p.nhlTeam||p.team||p.teamAbbrev||p.teamName||item?.proTeam||item?.teamAbbrev;
    const status=item?.status||p.status||item?.lineupStatus||item?.rosterStatus;
    const salary=item?.salary||p.salary;
    if(pos) bits.push(Array.isArray(pos)?pos.join("/"):String(pos));
    if(pro) bits.push(Array.isArray(pro)?pro.join("/"):String(pro));
    if(status) bits.push(String(status));
    if(salary) bits.push("$"+Number(salary).toLocaleString());
    return _clean(bits.join(" · "));
  }
  async function _api(endpoint, qs={}){
    const params=new URLSearchParams({league:FANTRAX_LIVE.league,endpoint});
    Object.entries(qs).forEach(([k,v])=>{if(v!=null&&v!=="")params.set(k,v)});
    const res=await fetch(`/api/fantrax?${params.toString()}`,{cache:"no-store"});
    let payload={};
    try{payload=await res.json();}catch(e){payload={error:"Non-JSON response"};}
    if(!res.ok||payload.ok===false) throw new Error(payload.error||payload.data?.message||`${endpoint} failed`);
    return payload;
  }
  async function _getLeagueInfo(){
    if(API_DETAIL_CACHE.leagueInfo) return API_DETAIL_CACHE.leagueInfo;
    const payload=await _api("leagueInfo");
    API_DETAIL_CACHE.leagueInfo=payload.data;
    return API_DETAIL_CACHE.leagueInfo;
  }
  function _buildPlayerMapFromLeagueInfo(data){
    const map={}; const seen=new Set();
    function walk(v){
      if(!v||typeof v!=="object") return;
      if(seen.has(v)) return; seen.add(v);
      if(Array.isArray(v)){v.forEach(walk);return;}
      const id=_objId(v), name=_objName(v);
      if(id && name){map[id]=v;}
      Object.values(v).forEach(walk);
    }
    walk(data);
    return map;
  }
  async function _getPlayerMap(){
    if(API_DETAIL_CACHE.playerMap) return API_DETAIL_CACHE.playerMap;
    try{API_DETAIL_CACHE.playerMap=_buildPlayerMapFromLeagueInfo(await _getLeagueInfo());}
    catch(e){API_DETAIL_CACHE.playerMap={};}
    return API_DETAIL_CACHE.playerMap;
  }
  window.playerNameFromObject=function(o){
    const direct=_objName(o); if(direct) return direct;
    const id=_objId(o); const mapped=id && API_DETAIL_CACHE.playerMap && API_DETAIL_CACHE.playerMap[id];
    return mapped?_objName(mapped):"";
  };
  window.playerMetaFromObject=function(o){
    const id=_objId(o); const mapped=id && API_DETAIL_CACHE.playerMap && API_DETAIL_CACHE.playerMap[id];
    return _objMeta(mapped||o,o);
  };
  window.extractRosterTeams=function(data){
    const teams=[]; const seen=new Set();
    const keys=["players","roster","rosterItems","lineup","bench","reserves","minors","slots","items"];
    function flattenItems(arr,out=[]){
      (arr||[]).forEach(x=>{
        if(!x) return;
        if(Array.isArray(x)) flattenItems(x,out);
        else if(typeof x==="object"){
          if(x.player||x.playerInfo||x.playerName||x.fullName||x.name||x.id||x.playerId||x.fantraxId) out.push(x);
          else keys.forEach(k=>Array.isArray(x[k])&&flattenItems(x[k],out));
        }
      });
      return out;
    }
    function walk(v){
      if(!v||typeof v!=="object") return;
      if(Array.isArray(v)){v.forEach(walk);return;}
      const teamId=v.teamId||v.fantasyTeamId||v.rosterId||v.id;
      const teamName=v.teamName||v.fantasyTeamName||v.name;
      const hasRosterArray=keys.some(k=>Array.isArray(v[k]));
      if((teamId||teamName)&&hasRosterArray){
        const key=String(teamId||teamName);
        if(!seen.has(key)){
          seen.add(key);
          let players=[];
          keys.forEach(k=>{if(Array.isArray(v[k])) flattenItems(v[k],players);});
          teams.push({teamId:_clean(teamId),teamName:_clean(teamName),players,raw:v});
        }
      }
      Object.values(v).forEach(walk);
    }
    walk(data);
    return teams;
  };
  window.loadApiRosters=async function(){
    if(ROSTER_STATE.loaded||ROSTER_STATE.loading) return ROSTER_STATE;
    ROSTER_STATE.loading=true;
    try{
      const rosterPayload=await _api("rosters");
      await _getPlayerMap();
      const teams=extractRosterTeams(rosterPayload.data);
      ROSTER_STATE.raw=rosterPayload.data;
      ROSTER_STATE.byTeamId={}; ROSTER_STATE.byName={};
      teams.forEach(rt=>{
        if(rt.teamId) ROSTER_STATE.byTeamId[rt.teamId]=rt;
        if(rt.teamName) ROSTER_STATE.byName[_norm(rt.teamName)]=rt;
      });
      ROSTER_STATE.loaded=true;
    }catch(e){ROSTER_STATE.error=e.message||String(e);} finally{ROSTER_STATE.loading=false;}

  };
  window.refreshBestRoster=async function(teamName,idx){
    const el=document.getElementById(`apiRosterPanel_${idx}`); if(!el) return;

    const roster=findRosterForTeam(teamName);
    if(!roster){el.textContent="Roster NOT FOUND for this team in the current Fantrax roster response. This may be a team-name/history mapping issue.";return;}
    const seen=new Set();
    const items=(roster.players||[]).map(item=>{
      const id=_objId(item); const mapped=id&&API_DETAIL_CACHE.playerMap?API_DETAIL_CACHE.playerMap[id]:null;
      const name=_objName(mapped||item)||id||"Unknown player";
      const meta=_objMeta(mapped||item,item)||"Fantrax player";
      return {id,name,meta,status:_clean(item.status||""),raw:item};
    }).filter(p=>{
      const k=p.id||_norm(p.name); if(!k||seen.has(k)) return false; seen.add(k); return true;
    });
    if(!items.length){el.innerHTML=`<div class="roster-status">Team found, but no roster items were recognized. Raw team object:</div><pre class="api-roster-raw">${safeJsonText(roster.raw)}</pre>`;return;}
    const groups={ACTIVE:[],RESERVE:[],MINORS:[],OTHER:[]};
    items.forEach(p=>{const s=p.status.toUpperCase(); (groups[s]||groups.OTHER).push(p);});
    const groupHtml=Object.entries(groups).filter(([_,arr])=>arr.length).map(([label,arr])=>`<div class="api-roster-section-title">${label} · ${arr.length}</div><div class="api-roster-grid">${arr.map(p=>`<div class="api-player-card"><div class="api-player-name">${_escape(p.name)}</div><div class="api-player-meta">${_escape(p.meta)}</div>${p.id?`<div class="api-player-sub">Fantrax ID: ${_escape(p.id)}</div>`:""}</div>`).join("")}</div>`).join("");
    el.className="";
    el.innerHTML=`<div class="api-roster-toolbar"><span class="api-roster-pill">${_escape(roster.teamName||teamName)}</span><span class="api-roster-pill">${items.length} players loaded</span><span class="api-roster-pill">Names matched through League Info API</span></div>${groupHtml}`;
  };
  function _tradeDate(tr){
    const keys=["date","transactionDate","processDate","processedDate","created","createdDate","time","timestamp","effectiveDate"];
    for(const k of keys){ if(tr&&tr[k]) return _clean(tr[k]); }
    const s=JSON.stringify(tr); const m=s.match(/20\d{2}[-\/]\d{1,2}[-\/]\d{1,2}/); return m?m[0]:"";
  }
  function _seasonFromDateString(s){
    const m=String(s||"").match(/(20\d{2})[-\/]\d{1,2}[-\/]\d{1,2}/); if(!m) return "";

  }
  function _collectPotentialTrades(data,source="unknown"){
    const trades=[]; const seen=new Set();
    function walk(v){
      if(!v||typeof v!=="object") return;
      if(Array.isArray(v)){v.forEach(walk);return;}
      const type=_clean(v.type||v.transactionType||v.tranType||v.action||v.name||v.eventType||"").toLowerCase();

      }
      Object.values(v).forEach(walk);
    }
    walk(data); return trades;
  }
  window.collectPotentialTrades=function(data){return _collectPotentialTrades(data,"current endpoint");};
  window.loadTradeData=async function(){
    if(TRADE_STATE.loaded||TRADE_STATE.loading) return TRADE_STATE;

      for(const ep of TRADE_ENDPOINT_CANDIDATES){

      try{
        const li=await _getLeagueInfo();
        const found=_collectPotentialTrades(li,"leagueInfo");

        all.push(...found);
      }catch(e){attempts.push({endpoint:"leagueInfo",ok:false,error:e.message||String(e)});}
      API_DETAIL_CACHE.endpointAttempts=attempts;
      const unique=[]; const seen=new Set();
      all.forEach(t=>{const k=JSON.stringify(t.raw).slice(0,1800); if(!seen.has(k)){seen.add(k); unique.push(t);}});
      TRADE_STATE.trades=unique; TRADE_STATE.raw={attempts}; TRADE_STATE.loaded=true;
      if(!unique.length) TRADE_STATE.error=null;
    }catch(e){TRADE_STATE.error=e.message||String(e);} finally{TRADE_STATE.loading=false;}
    return TRADE_STATE;
  };
  function _seasonOptions(){
    let seasons=[]; try{seasons=getSeasonList();}catch(e){}
    return `<option value="all">All Seasons</option>`+seasons.map(s=>`<option value="${_escape(s)}">${_escape((SN&&SN[s])||s)}</option>`).join("");
  }
  window.buildTradeHistoryPage=function(){
    return `<div class="trade-history-page"><div class="trade-title">Trade History</div><div class="trade-note">Select two teams to search Fantrax trade/transaction data. This page now checks several likely Fantrax transaction endpoints plus League Info, then shows exactly what was or was not found.</div><div class="trade-controls"><div class="trade-control"><label>Team One</label><select id="tradeTeamA" class="trade-select">${teamOptions()}</select></div><div class="trade-control"><label>Team Two</label><select id="tradeTeamB" class="trade-select">${teamOptions()}</select></div><div class="trade-control trade-season-row"><label class="trade-season-label">Season</label><select id="tradeSeason" class="trade-select">${_seasonOptions()}</select></div><button class="trade-button" onclick="runTradeSearch()">Find Trades</button></div><div id="tradeResults" class="trade-results"><div class="trade-status">Choose two teams, then click Find Trades.</div></div></div>`;
  };
  window.runTradeSearch=async function(){
    const out=document.getElementById("tradeResults"); if(!out) return;
    const a=document.getElementById("tradeTeamA")?.value||""; const b=document.getElementById("tradeTeamB")?.value||""; const season=document.getElementById("tradeSeason")?.value||"all";
    out.innerHTML=`<div class="trade-status">Searching Fantrax trade history for ${_escape(a)} ↔ ${_escape(b)}${season!=="all"?` · ${_escape(season)}`:""}...</div>`;
    const state=await loadTradeData();
    const teamA=TEAMS.find(t=>t.name===a)||{}, teamB=TEAMS.find(t=>t.name===b)||{};
    const aKeys=[a, teamA.fantraxTeamId, ...(teamA.history||[])].map(_norm).filter(Boolean);
    const bKeys=[b, teamB.fantraxTeamId, ...(teamB.history||[])].map(_norm).filter(Boolean);

  function rowFor(rows,name){const keys=aliasesFor(name); return rows.find(r=>[r.teamName,r.name,r.shortName,r.teamId,r.id].map(n).some(v=>keys.includes(v)));}
  function cleanRow(r){if(!r)return null;return {teamName:r.teamName||r.name||'',teamId:r.teamId||r.id||'',pointsFor:Number(r.totalPointsFor??r.pointsFor??r.fpts??r.score??0),record:parseRecord(r.points||r.record||r.wlt||r.winsLossesTies),rank:r.rank??'',raw:r};}
  async function fan(endpoint,extra){const params=new URLSearchParams({league:FANTRAX_LIVE.league,endpoint}); if(extra)Object.entries(extra).forEach(([k,v])=>{if(v!==undefined&&v!==null&&v!=='')params.set(k,v)}); const res=await fetch(`/api/fantrax?${params.toString()}`,{cache:'no-store'}); const json=await res.json(); if(!res.ok||!json.ok)throw new Error(json.error||`${endpoint} failed`); return json.data;}
  async function scanPeriods(max,onProgress){const snaps=[]; for(let p=1;p<=max;p++){try{onProgress&&onProgress(p,max); const data=await fan('standings',{period:p}); snaps.push({period:p,rows:rowsFrom(data),ok:true,raw:data});}catch(e){snaps.push({period:p,rows:[],ok:false,error:e.message||String(e)});} } return snaps;}
  function buildH2H(snaps,aName,bName){let prevA=null,prevB=null; const allChanges=[]; const h2h=[]; for(const snap of snaps){const a=cleanRow(rowFor(snap.rows,aName)); const b=cleanRow(rowFor(snap.rows,bName)); if(!a||!b){allChanges.push({period:snap.period,missing:{a:!a,b:!b},ok:snap.ok,error:snap.error});continue;} const aDiff={score:Math.round((a.pointsFor-(prevA?prevA.pointsFor:0))*100)/100,record:recordDiff(a.record,prevA?prevA.record:null)}; const bDiff={score:Math.round((b.pointsFor-(prevB?prevB.pointsFor:0))*100)/100,record:recordDiff(b.record,prevB?prevB.record:null)}; const aRes=diffResult(aDiff.record), bRes=diffResult(bDiff.record); const changed=Math.abs(aDiff.score)>0.001||Math.abs(bDiff.score)>0.001||aRes||bRes; const row={period:snap.period,a:aDiff,b:bDiff,aStanding:a,bStanding:b,aRes,bRes,changed}; if(changed)allChanges.push(row); const inverse=(aRes==='W'&&bRes==='L')||(aRes==='L'&&bRes==='W')||(aRes==='T'&&bRes==='T'); if(inverse){let result='T'; if(aRes==='W')result='W'; if(aRes==='L')result='L'; h2h.push({...row,result});} prevA=a; prevB=b;} return {allChanges,h2h};}
  function recordFromMatches(matches){return matches.reduce((acc,m)=>{if(m.result==='W')acc.w++;else if(m.result==='L')acc.l++;else acc.t++;return acc;},{w:0,l:0,t:0});}
  function recText(r){return `${r.w}-${r.l}-${r.t}`;}
  function resultClass(r){return r==='W'?'matchup-result-win':r==='L'?'matchup-result-loss':'matchup-result-tie';}
  function renderTable(matches,aName,bName){if(!matches.length)return `<div class="trade-status trade-empty-help"><b>No head-to-head games found from the standings API period scan.</b><br>The standings endpoint loaded, but I could not find periods where one selected team gained a win while the other gained a loss, or where both gained a tie.</div>`; return `<div class="matchup-history-table-wrap"><table class="matchup-history-table"><thead><tr><th>Period</th><th>Result</th><th>${h(aName)} Score</th><th>${h(bName)} Score</th><th>Record Change</th></tr></thead><tbody>${matches.map(m=>`<tr><td>Period ${h(m.period)}</td><td class="${resultClass(m.result)}">${m.result==='W'?`${h(aName)} Win`:m.result==='L'?`${h(bName)} Win`:'Tie'}</td><td>${h(m.a.score)}</td><td>${h(m.b.score)}</td><td>${h(m.aRes)} / ${h(m.bRes)}</td></tr>`).join('')}</tbody></table></div>`;}
  window.buildTradeHistoryPage=function(){return `<div class="trade-history-page"><div class="trade-title">Matchup History</div><div class="trade-note">Select two teams to build a head-to-head record from Fantrax standings periods. The page looks for periods where Team One gained a win/loss/tie and Team Two gained the opposite result, then lists those matchups.</div><div class="trade-controls"><div class="trade-control"><label>Team One</label><select id="tradeTeamA" class="trade-select">${teamOptions()}</select></div><div class="trade-control"><label>Team Two</label><select id="tradeTeamB" class="trade-select">${teamOptions()}</select></div><div class="trade-control trade-season-row"><label class="trade-season-label">Season</label><select id="tradeSeason" class="trade-select">${seasonOptions()}</select></div><div class="trade-control"><label>Scan Periods</label><input id="matchupMaxPeriod" class="matchup-mini-input" type="number" min="1" max="80" value="30"></div><button class="trade-button" onclick="runTradeSearch()">Find Matchups</button></div><div class="matchup-v13-note">For now, this can only show the matchup history available from the Fantrax league ID/API season that Netlify can read. Older seasons may need old Fantrax league IDs if Fantrax stores each season separately.</div><div id="tradeResults" class="trade-results"><div class="trade-status">Choose two teams, then click Find Matchups.</div></div></div>`;};
  window.runTradeSearch=async function(){const out=document.getElementById('tradeResults'); if(!out)return; const a=document.getElementById('tradeTeamA')?.value||''; const b=document.getElementById('tradeTeamB')?.value||''; const season=document.getElementById('tradeSeason')?.value||'all'; const max=Math.max(1,Math.min(80,Number(document.getElementById('matchupMaxPeriod')?.value||30))); out.innerHTML=`<div class="trade-status">Scanning Fantrax periods 1-${h(max)} for ${h(a)} vs ${h(b)}...</div>`; try{let prog=0; const timer=setInterval(()=>{out.innerHTML=`<div class="trade-status">Scanning period ${h(prog||1)} of ${h(max)} for ${h(a)} vs ${h(b)}...</div>`},650); const snaps=await scanPeriods(max,(p)=>prog=p); clearInterval(timer); const {allChanges,h2h}=buildH2H(snaps,a,b); const rec=recordFromMatches(h2h); const data0=JSON.stringify(rowsFrom(snaps[0]?.raw||snaps[0]?.rows||[])); const data1=JSON.stringify(rowsFrom(snaps[1]?.raw||snaps[1]?.rows||[])); const data2=JSON.stringify(rowsFrom(snaps[2]?.raw||snaps[2]?.rows||[])); const ignored=snaps.length>2&&data0===data1&&data1===data2; const current=rowsFrom(await fan('standings')); const curA=cleanRow(rowFor(current,a)), curB=cleanRow(rowFor(current,b)); const summary=`<div class="matchup-clean-summary"><div class="matchup-clean-stat"><b>${h(recText(rec))}</b><span>${h(a)} H2H Record</span></div><div class="matchup-clean-stat"><b>${h(h2h.length)}</b><span>Matchups Found</span></div><div class="matchup-clean-stat"><b>${h(season==='all'?'API':((typeof SN!=='undefined'&&SN&&SN[season])?SN[season]:season))}</b><span>Season Source</span></div><div class="matchup-clean-stat"><b>${h(max)}</b><span>Periods Scanned</span></div></div>`; const note=ignored?`<div class="matchup-v13-note"><b>Warning:</b> the first few period requests returned identical standings. If Fantrax is ignoring the period number, this page cannot build matchup history from this endpoint yet.</div>`:''; const seasonWarn=(season!=='all'&&season!==CURRENT_API_SEASON)?`<div class="matchup-v13-note">This league ID appears to return the current API season. To show ${h((typeof SN!=='undefined'&&SN&&SN[season])?SN[season]:season)} accurately, we may need that season's Fantrax league ID.</div>`:''; const currentLine=`<div class="matchup-v13-small">Current standings check: ${h(a)} ${h(curA?`${recText(curA.record)} · ${curA.pointsFor} pts`:'not found')} | ${h(b)} ${h(curB?`${recText(curB.record)} · ${curB.pointsFor} pts`:'not found')}</div>`; out.innerHTML=summary+note+seasonWarn+currentLine+renderTable(h2h,a,b)+`<details class="trade-debug matchup-debug"><summary>Diagnostics / all period changes</summary><pre>${h(JSON.stringify({selected:{a,b,season,maxPeriod:max},headToHeadRecord:rec,matchups:h2h,allScoringOrRecordChanges:allChanges.slice(0,80),periodIgnoredLikely:ignored,samplePeriods:snaps.slice(0,3).map(s=>({period:s.period,ok:s.ok,error:s.error,rowCount:(s.rows||[]).length,firstRows:(s.rows||[]).slice(0,2)}))},null,2))}</pre></details>`;}catch(e){out.innerHTML=`<div class="trade-status">Matchup scan failed: ${h(e.message||String(e))}</div>`;}};
  document.addEventListener('DOMContentLoaded',()=>{const t=document.getElementById('tabTrade'); if(t)t.textContent='Matchup History';});
})();
</script>


<!-- === API v14 patch: real Fantrax Results/Schedule matchup history from fxpa getStandings view=SCHEDULE === -->
<style>
  .matchup-v14-note{border:1px solid rgba(213,157,70,.35);background:rgba(213,157,70,.08);border-radius:12px;padding:10px;margin:10px 0;color:#f4d28a;font-size:12px;line-height:1.45}

  .matchup-v14-table th,.matchup-v14-table td{padding:8px;border-bottom:1px solid rgba(213,157,70,.16);text-align:left}
  .matchup-v14-table th{color:#f0c46b;text-transform:uppercase;font-size:10px;letter-spacing:.08em;background:rgba(0,0,0,.42)}
  .matchup-v14-win{color:#8ee6a6;font-weight:800}.matchup-v14-loss{color:#ff9b9b;font-weight:800}.matchup-v14-tie{color:#f4d28a;font-weight:800}
  .matchup-v14-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:8px;margin:12px 0}
  .matchup-v14-card{border:1px solid rgba(213,157,70,.25);border-radius:12px;background:rgba(0,0,0,.38);padding:10px;text-align:center}
  .matchup-v14-card b{display:block;color:#ffd98b;font-family:Impact,"Arial Black",sans-serif;font-size:22px;letter-spacing:1px}.matchup-v14-card span{font-size:10px;color:rgba(255,255,255,.62);text-transform:uppercase;letter-spacing:.08em}
</style>
<script>
(function(){
  const esc2 = window.esc || function(v){return String(v ?? '').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));};
  const norm2 = window.norm || function(v){return String(v ?? '').toLowerCase().replace(/&/g,'and').replace(/[^a-z0-9]+/g,'').trim();};
  function currentSeasonLabel(){
    if(window.FANTRAX_LIVE?.seasonKey) return window.FANTRAX_LIVE.seasonKey;
    if(window.FANTRAX_LIVE?.seasonYear) return String(window.FANTRAX_LIVE.seasonYear).includes('/') ? window.FANTRAX_LIVE.seasonYear : String(window.FANTRAX_LIVE.seasonYear) + '/26';
    return 'Current API Season';
  }
  function getTeamsFromRow(row){
    const c = row?.cells || [];
    if(c.length < 4) return null;
    const awayName = c[0]?.content ?? c[0]?.name ?? '';
    const awayId = c[0]?.teamId ?? c[0]?.id ?? '';
    const awayScore = parseFloat(String(c[1]?.content ?? '').replace(/,/g,''));
    const homeName = c[2]?.content ?? c[2]?.name ?? '';
    const homeId = c[2]?.teamId ?? c[2]?.id ?? '';
    const homeScore = parseFloat(String(c[3]?.content ?? '').replace(/,/g,''));
    if(!awayName || !homeName || Number.isNaN(awayScore) || Number.isNaN(homeScore)) return null;
    return { awayName, awayId, awayScore, homeName, homeId, homeScore };
  }
  function parseSchedulePayload(payload){
    const data = payload?.data || payload;
    const scheduleData = data?.responses?.[0]?.data || data?.data?.responses?.[0]?.data || data;
    const teamInfo = scheduleData?.fantasyTeamInfo || {};
    const tableList = Array.isArray(scheduleData?.tableList) ? scheduleData.tableList : [];
    const out=[];
    tableList.forEach((table, idx)=>{
      const caption = table.caption || '';
      const period = (caption.match(/Scoring\s+Period\s+(\d+)/i)||[])[1] || String(idx+1);
      const dateRange = table.subCaption || '';
      (table.rows || []).forEach(row=>{
        const m = getTeamsFromRow(row);
        if(!m) return;
        const awayInfo = teamInfo[m.awayId] || {};
        const homeInfo = teamInfo[m.homeId] || {};
        const winner = m.awayScore > m.homeScore ? m.awayName : m.homeScore > m.awayScore ? m.homeName : 'Tie';
        out.push({
          period,
          caption,
          dateRange,
          season: currentSeasonLabel(),
          awayName: m.awayName,
          awayId: m.awayId,
          awayShort: awayInfo.shortName || '',
          awayScore: m.awayScore,
          homeName: m.homeName,
          homeId: m.homeId,
          homeShort: homeInfo.shortName || '',
          homeScore: m.homeScore,
          winner,
          raw: row
        });
      });
    });
    return out;
  }
  function teamMatch(gameTeamName, gameTeamId, selected){
    if(!selected) return false;
    const keys = new Set([norm2(selected)]);
    try{ if(window.teamKeys){ (window.teamKeys(selected)||[]).forEach(k=>keys.add(norm2(k))); } }catch(e){}
    keys.add(norm2(gameTeamName));
    return keys.has(norm2(selected)) || norm2(gameTeamName)===norm2(selected) || keys.has(norm2(gameTeamName)) || keys.has(norm2(gameTeamId));
  }
  function involves(game, a, b){
    const awayA = teamMatch(game.awayName, game.awayId, a), homeA = teamMatch(game.homeName, game.homeId, a);
    const awayB = teamMatch(game.awayName, game.awayId, b), homeB = teamMatch(game.homeName, game.homeId, b);
    return (awayA && homeB) || (awayB && homeA);
  }
  function perspectiveResult(game, a){
    const selectedIsAway = teamMatch(game.awayName, game.awayId, a);
    const ourScore = selectedIsAway ? game.awayScore : game.homeScore;
    const theirScore = selectedIsAway ? game.homeScore : game.awayScore;
    if(ourScore > theirScore) return 'W';
    if(ourScore < theirScore) return 'L';
    return 'T';
  }
  window.buildTradeHistoryPage = function(){
    const teamOpts = (window.teamOptions ? window.teamOptions() : '');
    const seasonOpts = `<option value="all">All Time / Current API Results</option><option value="current">${esc2(currentSeasonLabel())}</option>`;
    return `<div class="trade-history-page"><div class="trade-title">Matchup History</div><div class="trade-note">Select two teams to build a head-to-head record from Fantrax's real Standings → Results data.</div><div class="trade-controls"><div class="trade-control"><label>Team One</label><select id="tradeTeamA" class="trade-select">${teamOpts}</select></div><div class="trade-control"><label>Team Two</label><select id="tradeTeamB" class="trade-select">${teamOpts}</select></div><div class="trade-control trade-season-row"><label class="trade-season-label">Season</label><select id="tradeSeason" class="trade-select">${seasonOpts}</select></div><button class="trade-button" onclick="runTradeSearch()">Find Matchups</button></div><div class="matchup-v14-note">This version uses Fantrax's hidden Results request: <b>getStandings + view=SCHEDULE</b>. It should show the matchup results visible on the Fantrax Results page for the current API season.</div><div id="tradeResults" class="trade-results"><div class="trade-status">Choose two teams, then click Find Matchups.</div></div></div>`;
  };
  window.runTradeSearch = async function(){
    const out=document.getElementById('tradeResults'); if(!out) return;
    const a=document.getElementById('tradeTeamA')?.value||'';
    const b=document.getElementById('tradeTeamB')?.value||'';
    const season=document.getElementById('tradeSeason')?.value||'all';
    if(!a || !b || norm2(a)===norm2(b)){ out.innerHTML='<div class="trade-status">Choose two different teams.</div>'; return; }
    out.innerHTML=`<div class="trade-status">Loading Fantrax Results/Schedule matchups for ${esc2(a)} vs ${esc2(b)}...</div>`;
    try{
      const league = window.FANTRAX_LIVE?.league || 'bbl';
      const res = await fetch(`/api/fantrax?league=${encodeURIComponent(league)}&endpoint=scheduleResults`, {cache:'no-store'});
      const payload = await res.json();
      if(!res.ok || !payload.ok) throw new Error(payload.error || payload.data?.raw || 'Fantrax scheduleResults failed');
      const games = parseSchedulePayload(payload.data);
      let matches = games.filter(g=>involves(g,a,b));
      if(season !== 'all' && season !== 'current') matches = matches.filter(g=>norm2(g.season).includes(norm2(season)) || norm2(g.caption).includes(norm2(season)) || norm2(g.dateRange).includes(norm2(season)));
      if(!matches.length){
        const sample=games.slice(0,12).map(g=>({period:g.period,away:g.awayName,awayScore:g.awayScore,home:g.homeName,homeScore:g.homeScore}));
        out.innerHTML=`<div class="trade-status trade-empty-help"><b>No head-to-head games found for ${esc2(a)} vs ${esc2(b)}.</b><br>The Results endpoint returned ${games.length} games total for ${esc2(currentSeasonLabel())}. Try selecting exact current Fantrax team names if this pair should exist.</div><details class="trade-debug"><summary>Schedule sample / diagnostics</summary><pre class="trade-card-pre">${esc2(JSON.stringify({endpoint:payload.sourceType,source:payload.source,totalGames:games.length,selected:{a,b,season},sample},null,2))}</pre></details>`;
        return;
      }
      matches.sort((x,y)=>(Number(x.period)||0)-(Number(y.period)||0));
      let w=0,l=0,t=0, pf=0, pa=0;
      matches.forEach(g=>{const r=perspectiveResult(g,a); if(r==='W')w++; else if(r==='L')l++; else t++; const isAway=teamMatch(g.awayName,g.awayId,a); pf += isAway?g.awayScore:g.homeScore; pa += isAway?g.homeScore:g.awayScore;});
      const rows=matches.map(g=>{const isAway=teamMatch(g.awayName,g.awayId,a); const ourTeam=isAway?g.awayName:g.homeName; const oppTeam=isAway?g.homeName:g.awayName; const ourScore=isAway?g.awayScore:g.homeScore; const oppScore=isAway?g.homeScore:g.awayScore; const r=perspectiveResult(g,a); const cls=r==='W'?'matchup-v14-win':r==='L'?'matchup-v14-loss':'matchup-v14-tie'; return `<tr><td>${esc2(g.period)}</td><td>${esc2(g.dateRange)}</td><td>${esc2(ourTeam)} <b>${esc2(ourScore)}</b></td><td>${esc2(oppTeam)} <b>${esc2(oppScore)}</b></td><td class="${cls}">${r}</td></tr>`;}).join('');
      out.innerHTML=`<div class="matchup-v14-summary"><div class="matchup-v14-card"><b>${w}-${l}-${t}</b><span>${esc2(a)} H2H Record</span></div><div class="matchup-v14-card"><b>${matches.length}</b><span>Matchups Found</span></div><div class="matchup-v14-card"><b>${pf.toFixed(2)}</b><span>${esc2(a)} Total FPts</span></div><div class="matchup-v14-card"><b>${pa.toFixed(2)}</b><span>${esc2(b)} Total FPts</span></div></div><table class="matchup-v14-table"><thead><tr><th>Period</th><th>Date</th><th>${esc2(a)}</th><th>${esc2(b)}</th><th>Result</th></tr></thead><tbody>${rows}</tbody></table><details class="trade-debug"><summary>Endpoint diagnostics</summary><pre class="trade-card-pre">${esc2(JSON.stringify({sourceType:payload.sourceType,source:payload.source,totalScheduleGames:games.length,matched:matches.length},null,2))}</pre></details>`;
    }catch(err){ out.innerHTML=`<div class="trade-status">Matchup history failed: ${esc2(err.message || String(err))}</div>`; }
  };
  document.addEventListener('DOMContentLoaded',()=>{const t=document.getElementById('tabTrade'); if(t)t.textContent='Matchup History';});
})();
</script>

<script>
(function(){
  const LEAGUE_KEY = "bbl";

  const norm=v=>String(v??"").toLowerCase().replace(/&amp;/g,"&").replace(/â€™/g,"'").replace(/[’`]/g,"'").replace(/[^a-z0-9]+/g,"").trim();
  const h=v=>String(v??"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const recStr=r=>r&&Number.isFinite(+r.w)?`${r.w}-${r.l}-${r.t||0}`:"—";

  const cleanName=n=>String(n||"").replace(/â€™/g,"’").replace(/\s+-\s*\(\s*Bye week\s*\)/i,"").replace(/\bIn The\b/g,"in the").replace(/ChewBacca/g,"Chewbacca").trim();
  const teamKeys=t=>{const out=new Set([norm(t?.name||t)]); if(t&&t.history)(t.history||[]).forEach(x=>out.add(norm(x))); if(t&&t.seasonNames)Object.values(t.seasonNames||{}).forEach(x=>out.add(norm(x))); return out;};
  const allTeamOptions=()=>TEAMS.map(t=>`<option value="${h(t.name)}">${h(t.name)}</option>`).join("");

  function standingsRows(data){return Array.isArray(data)?data:(Array.isArray(data?.data)?data.data:(Array.isArray(data?.standings)?data.standings:[]));}
  function parseApiRecord(row){const s=String(row?.points||row?.record||""); const m=s.match(/(\d+)\D+(\d+)\D+(\d+)/); return m?{w:+m[1],l:+m[2],t:+m[3]}:null;}
  function matchApiRow(team, rows){const keys=teamKeys(team); return (rows||[]).find(r=>{const n=norm(cleanName(r.teamName||r.name||r.team?.name)); return keys.has(n) || [...keys].some(k=>n.includes(k)||k.includes(n));});}
  function flatten(obj, out=[]){if(!obj||typeof obj!=="object")return out; if(Array.isArray(obj)){obj.forEach(x=>flatten(x,out));return out;} if(obj.teamName && (obj.rosterItems||obj.players||obj.roster)) out.push(obj); Object.values(obj).forEach(v=>flatten(v,out)); return out;}
  function rosterItems(teamObj){return teamObj?.rosterItems||teamObj?.players||teamObj?.roster||teamObj?.items||[];}
  function rosterTeamFor(team, rosterPayload){const teams=flatten(rosterPayload); const keys=teamKeys(team); return teams.find(rt=>keys.has(norm(cleanName(rt.teamName||rt.name)))||[...keys].some(k=>norm(cleanName(rt.teamName||rt.name)).includes(k)||k.includes(norm(cleanName(rt.teamName||rt.name)))));}
  function summarizeRoster(rt){const items=rosterItems(rt); const status={}, pos={F:0,D:0,G:0,Other:0}; let salary=0; items.forEach(p=>{const st=String(p.status||"ACTIVE").toUpperCase(); status[st]=(status[st]||0)+1; const pp=String(p.position||p.pos||"").toUpperCase(); if(pp.includes("G"))pos.G++; else if(pp.includes("D"))pos.D++; else if(pp.includes("F")||pp.includes("C")||pp.includes("LW")||pp.includes("RW"))pos.F++; else pos.Other++; const sal=Number(p.salary||p.capHit||0); if(Number.isFinite(sal))salary+=sal;}); return {count:items.length,status,pos,salary};}
  function getEmbeddedCurrent(team){const pts=team?.seasons?.[CURRENT_SEASON]; const rec=team?.records?.[CURRENT_SEASON]||null; return {pts,rec};}
  function ensureTabs(){const old=document.getElementById("tabTrade"); if(old){old.outerHTML=`<button class="tab" id="tabCompare" onclick="setView('teamcompare')">Team Compare</button>`;} const img=document.querySelector('.header .final-header-art'); if(img&&!document.getElementById('sportsCrawl')){img.insertAdjacentHTML('afterend',`<div class="sports-crawl" id="sportsCrawl"><div class="sports-crawl-label">LIVE WIRE</div><div class="sports-crawl-window"><div class="sports-crawl-track" id="sportsCrawlTrack"><span class="ticker-item"><span class="ticker-tag">Loading</span> Fantrax API ticker warming up...</span></div></div></div>`); loadTicker();}}
  async function loadTicker(){const el=document.getElementById('sportsCrawlTrack'); if(!el)return; const items=[]; try{const st=await getJson('standings'); const rows=standingsRows(st.data); const sorted=[...rows].sort((a,b)=>(+a.rank||99)-(+b.rank||99)); sorted.slice(0,6).forEach(r=>items.push(`<span class="ticker-item"><span class="ticker-tag">Standings</span>${h(cleanName(r.teamName))} #${h(r.rank)} · ${h(r.points||'')} · ${h(r.totalPointsFor)} pts</span>`)); const high=[...rows].sort((a,b)=>(+b.totalPointsFor||0)-(+a.totalPointsFor||0))[0]; if(high)items.push(`<span class="ticker-item"><span class="ticker-tag">Points Leader</span>${h(cleanName(high.teamName))} · ${h(high.totalPointsFor)} fantasy pts</span>`); }catch(e){items.push(`<span class="ticker-item"><span class="ticker-tag">API</span><span class="ticker-dim">Standings ticker unavailable: ${h(e.message)}</span></span>`);} items.push(`<span class="ticker-item"><span class="ticker-tag">Future</span>Live matchup scores can plug in here when Fantrax exposes live results next season.</span>`); items.push(`<span class="ticker-item"><span class="ticker-tag">News Desk</span>Draft Order, rule updates, commissioner notes, awards, and trade alerts can be added to this crawl later.</span>`); el.innerHTML=(items.join('')+items.join(''));
  }
  function buildApiCheckerPage(){return `<div class="api-tool-page"><div class="api-tool-title">API Accuracy Checker</div><div class="api-tool-note">Compares live Fantrax standings against the embedded site data for ${CURRENT_SEASON}. Mismatches show exactly where the API and old data disagree.</div><div id="apiCheckerOut"><div class="trade-status">Loading Fantrax comparison...</div></div></div>`;}
  async function runApiChecker(){const out=document.getElementById('apiCheckerOut'); if(!out)return; try{const endpoints=['standings','rosters','draftResults','draftPicks','leagueInfo']; const results={}; for(const ep of endpoints){try{results[ep]=await getJson(ep);}catch(e){results[ep]={ok:false,error:e.message};}} const rows=standingsRows(results.standings?.data); let matches=0, mismatches=0, missing=0; const table=TEAMS.map(t=>{const api=matchApiRow(t,rows); if(!api){missing++; return `<tr><td>${h(t.name)}</td><td class="api-status-bad">NOT FOUND</td><td>—</td><td>${h(getEmbeddedCurrent(t).pts??'—')}</td><td>—</td><td>${h(recStr(getEmbeddedCurrent(t).rec))}</td></tr>`;} const emb=getEmbeddedCurrent(t); const apiRec=parseApiRecord(api); const ptsOk=Math.abs((+api.totalPointsFor||0)-(+emb.pts||0))<0.011; const recOk=norm(api.points||'')===norm(recStr(emb.rec)); const ok=ptsOk&&recOk; ok?matches++:mismatches++; return `<tr><td>${h(t.name)}</td><td class="${ok?'api-status-ok':'api-status-warn'}">${ok?'MATCH':'CHECK'}</td><td>${h(api.totalPointsFor)}</td><td>${h(emb.pts??'—')}</td><td>${h(api.points||'—')}</td><td>${h(recStr(emb.rec))}</td></tr>`;}).join(''); const epCards=endpoints.map(ep=>`<div class="api-tool-card"><b class="${results[ep]?.ok!==false?'api-status-ok':'api-status-bad'}">${results[ep]?.ok!==false?'OK':'FAIL'}</b><span>${h(ep)} ${results[ep]?.error?`· ${h(results[ep].error)}`:''}</span></div>`).join(''); out.innerHTML=`<div class="api-tool-grid"><div class="api-tool-card"><b>${matches}</b><span>Teams Matched</span></div><div class="api-tool-card"><b>${mismatches}</b><span>Teams Need Checking</span></div><div class="api-tool-card"><b>${missing}</b><span>API Team Not Found</span></div><div class="api-tool-card"><b>${rows.length}</b><span>API Standings Rows</span></div></div><div class="api-tool-grid">${epCards}</div><div class="api-table-wrap"><table class="api-table"><thead><tr><th>Team</th><th>Status</th><th>API Pts</th><th>Site Pts</th><th>API Record</th><th>Site Record</th></tr></thead><tbody>${table}</tbody></table></div>`;}catch(e){out.innerHTML=`<div class="trade-status">API checker failed: ${h(e.message)}</div>`;}}
  function buildTeamComparePage(){return `<div class="api-tool-page"><div class="api-tool-title">Team Compare</div><div class="api-tool-note">Select two teams and compare current Fantrax standings, record, points, roster makeup, status counts, and salary if Fantrax provides it.</div><div class="api-controls"><div><label>Team One</label><select class="api-select" id="compareA">${allTeamOptions()}</select></div><div><label>Team Two</label><select class="api-select" id="compareB">${allTeamOptions()}</select></div><button class="api-button" onclick="runTeamCompare()">Compare Teams</button></div><div id="teamCompareOut"><div class="trade-status">Choose two teams, then click Compare Teams.</div></div></div>`;}
  function renderCompareCard(team, api, roster){const sum=roster?summarizeRoster(roster):null; return `<div class="api-compare-team"><div class="api-compare-name">${h(team.name)}</div><div class="api-mini-stats"><div class="api-mini-stat"><b>${h(api?.rank??'—')}</b><span>Current Rank</span></div><div class="api-mini-stat"><b>${h(api?.points??'—')}</b><span>Record</span></div><div class="api-mini-stat"><b>${h(api?.totalPointsFor??'—')}</b><span>Fantasy Points</span></div><div class="api-mini-stat"><b>${h(api?.winPercentage??'—')}</b><span>Win %</span></div></div><div class="api-roster-mini"><b>Current Roster Snapshot</b><br>${sum?`${sum.count} players · F ${sum.pos.F} · D ${sum.pos.D} · G ${sum.pos.G} · Other ${sum.pos.Other}<br>Active ${sum.status.ACTIVE||0} · Reserve ${sum.status.RESERVE||0} · Minors ${sum.status.MINORS||0}<br>${sum.salary?`Salary total: $${Math.round(sum.salary).toLocaleString()}`:'Salary total: NOT FOUND'}`:'Roster not found from API.'}</div></div>`;}
  window.runTeamCompare=async function(){const out=document.getElementById('teamCompareOut'); if(!out)return; out.innerHTML='<div class="trade-status">Loading Fantrax team comparison...</div>'; try{const aName=document.getElementById('compareA').value,bName=document.getElementById('compareB').value; const a=TEAMS.find(t=>t.name===aName), b=TEAMS.find(t=>t.name===bName); const [st,ro]=await Promise.all([getJson('standings'),getJson('rosters').catch(e=>({data:null,error:e.message}))]); const rows=standingsRows(st.data); const rosterData=ro.data; const aApi=matchApiRow(a,rows), bApi=matchApiRow(b,rows); const aRoster=rosterData?rosterTeamFor(a,rosterData):null, bRoster=rosterData?rosterTeamFor(b,rosterData):null; out.innerHTML=`<div class="api-compare-grid">${renderCompareCard(a,aApi,aRoster)}${renderCompareCard(b,bApi,bRoster)}</div>`;}catch(e){out.innerHTML=`<div class="trade-status">Team comparison failed: ${h(e.message)}</div>`;}};
  const oldRender=window.render||render; window.render=render=function(){ if(view==='apicheck'){document.getElementById('board').innerHTML=buildApiCheckerPage(); setTimeout(runApiChecker,25); return;} if(view==='teamcompare'){document.getElementById('board').innerHTML=buildTeamComparePage(); return;} return oldRender(); };
  const oldCtrl=window.ctrl||ctrl; window.ctrl=ctrl=function(){ oldCtrl(); const special=view==='apicheck'||view==='teamcompare'; ['fRowEra','fRow1','fRow2','fRowA'].forEach(id=>{const el=document.getElementById(id); if(el&&special)el.classList.add('hide');}); const api=document.getElementById('tabApiCheck'), comp=document.getElementById('tabCompare'); if(api)api.classList.toggle('active',view==='apicheck'); if(comp)comp.classList.toggle('active',view==='teamcompare'); };
  document.addEventListener('DOMContentLoaded',()=>{ensureTabs(); try{document.querySelectorAll('.api-roster-note').forEach(n=>{if(/Click row to view current Fantrax roster/i.test(n.textContent))n.textContent='Current Fantrax roster only — historic best-season rosters are not exposed by the public API yet.';});}catch(e){} });
})();
</script>

<script>
(function(){

  const trophyLabels={championship:'Championships',presidents:'Presidents',clarence:'Clarence Campbell',wales:'Prince of Wales',hart:'Hart',norris:'Norris',vezina:'Vezina',calder:'Rookie',artross:'Art Ross',mvfp:'MVFP'};
  const trophyKeys=['championship','presidents','clarence','wales','hart','norris','vezina','calder','artross','mvfp'];
